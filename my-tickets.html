<!DOCTYPE html>
<html>
<head>
  <title>My Tickets</title>
  <script src="https://sdk.minepi.com/pi-sdk.js"></script>

  <style>
    body {
      font-family: Arial;
      background: linear-gradient(180deg, #020617, #0f172a);
      color: white;
      margin: 0;
    }

    header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 15px;
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(10px);
    }

    header img {
      width: 35px;
      height: 35px;
      border-radius: 8px;
    }

    header span {
      font-size: 20px;
      font-weight: bold;
    }

    .container {
      padding: 15px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 15px;
      margin-top: 20px;
    }

    .card {
      background: rgba(255,255,255,0.05);
      border-radius: 16px;
      overflow: hidden;
    }

    .card img {
      width: 100%;
      height: 120px;
      object-fit: cover;
    }

    .card-body {
      padding: 10px;
    }

    .title {
      font-weight: bold;
    }

    .small {
      color: #94a3b8;
      font-size: 12px;
    }

    .total {
      font-weight: bold;
      margin-top: 5px;
    }

    .back-btn {
      margin-top: 15px;
      width: 100%;
      padding: 10px;
      background: #334155;
      color: white;
      border: none;
      border-radius: 10px;
    }
  </style>
</head>

<body>

<header>
  <img src="0ED2A097-4CDA-417A-A473-BCD55056B90E.png?v=1">
  <span>My Tickets</span>
</header>

<div class="container">
  <h2 id="title"></h2>
  <div id="tickets" class="grid"></div>

  <button class="back-btn" onclick="back()">⬅ Back</button>
</div>

<script>
const feePercent = 0.05;

function loadTickets() {
  return JSON.parse(localStorage.getItem("tickets")) || [];
}

function render() {
  const username = localStorage.getItem("username") || "Unknown";
  const all = loadTickets();

  document.getElementById("title").innerText = "Tickets by " + username;

  const mine = all.filter(t => t.seller === username);

  const container = document.getElementById("tickets");
  container.innerHTML = "";

  if (mine.length === 0) {
    container.innerHTML = "<p>No tickets yet</p>";
    return;
  }

  mine.forEach(ticket => {
    const fee = ticket.price * feePercent;
    const total = ticket.price + fee;

    const image = ticket.image && ticket.image.trim() !== ""
      ? ticket.image
      : "https://images.unsplash.com/photo-1508098682722-e99c643e7f5c";

    container.innerHTML += `
      <div class="card">
        <img src="${image}">
        <div class="card-body">
          <div class="title">${ticket.title}</div>
          <div class="small">${ticket.category}</div>
          <div class="small">👤 ${ticket.seller}</div>
          <div>${ticket.price.toFixed(2)} Pi</div>
          <div class="total">${total.toFixed(2)} Pi</div>
        </div>
      </div>
    `;
  });
}

function back() {
  window.location.href = "index.html";
}

render();
</script>

</body>
</html>
