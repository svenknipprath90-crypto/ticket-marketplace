<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Meine Verkäufe</title>

<!-- External Scripts -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://sdk.minepi.com/pi-sdk.js"></script>

<!-- CSS & i18n -->
<link rel="stylesheet" href="style.css">
<script src="i18n.js"></script>

<style>
.sales-card {
  background: var(--glass-bg);
  border: 1px solid var(--glass-border);
  border-radius: 15px;
  padding: 20px;
  margin-bottom: 20px;
  display: flex;
  gap: 20px;
  align-items: center;
}
.sales-card img {
  width: 120px;
  height: 120px;
  object-fit: cover;
  border-radius: 10px;
}
.sales-content {
  flex-grow: 1;
}
</style>
</head>
<body>

<div class="container">

  <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
    <a href="index.html" class="btn btn-glass" data-i18n="back">⬅ Zurück</a>
    <div class="lang-toggle">
      <button class="lang-btn" id="lang-de" onclick="setLanguage('de'); window.location.reload();">🇩🇪</button>
      <button class="lang-btn" id="lang-en" onclick="setLanguage('en'); window.location.reload();">🇬🇧</button>
    </div>
  </div>

  <h1 data-i18n="myTickets">🎫 Meine Verkäufe</h1>
  <p data-i18n="salesDesc" style="color: var(--text-muted); margin-bottom: 30px;">
    Hier siehst du alle Tickets, die du erstellt hast, sowie deren Restbestand.
  </p>

  <div id="salesList">
    <div style="text-align: center;">Lade... / Loading...</div>
  </div>

</div>

<script>
// ================= USER & INIT =================
let currentUser = localStorage.getItem("pi_user") || null;

document.addEventListener("DOMContentLoaded", () => {
  document.getElementById("lang-de").classList.toggle("active", currentLang === "de");
  document.getElementById("lang-en").classList.toggle("active", currentLang === "en");

  if (!currentUser) {
    alert(t("notLoggedIn"));
    window.location.href = "index.html";
  } else {
    loadSales();
  }
});

// ================= SUPABASE =================
const db = window.supabase.createClient(
  "https://rucejmhjgfvlntoxhczm.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ1Y2VqbWhqZ2Z2bG50b3hoY3ptIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1NTU4OTcsImV4cCI6MjA5MDEzMTg5N30.Eq1vP38qyX0c-m23mceGg-gxZD_mn4sOyGqVxZMRoFk"
);

// ================= LOAD SALES & ORDERS =================
async function loadSales() {
  const el = document.getElementById("salesList");
  el.innerHTML = `
    <div style="margin-bottom: 30px; text-align: center;">
      <a href="scanner.html" class="btn btn-primary" style="font-size: 18px; padding: 15px 30px; border-radius: 15px; display: inline-block;">
        📸 Ticket Scanner (Für den Einlass)
      </a>
    </div>
  `;

  // 1. Load Tickets
  const { data: ticketsData } = await db
    .from("tickets")
    .select("*")
    .eq("seller", currentUser)
    .order("created_at", { ascending: false });

  if (ticketsData && ticketsData.length > 0) {
    el.innerHTML += `<h2 style="margin-top: 30px;">Dein Ticket-Bestand</h2>`;
    ticketsData.forEach(ticket => {
      const isSoldOut = ticket.quantity <= 0;
      const qtyText = isSoldOut ? "❌ Ausverkauft" : `📦 Restbestand: ${ticket.quantity}`;
      const qtyColor = isSoldOut ? "var(--danger)" : "var(--success)";

      el.innerHTML += `
        <div class="sales-card">
          ${ticket.image ? `<img src="${ticket.image}">` : `<div style="width:120px;height:120px;background:#334155;border-radius:10px;display:flex;align-items:center;justify-content:center;">Kein Bild</div>`}
          <div class="sales-content">
            <span class="tag">${ticket.category}</span>
            <h3 style="margin: 5px 0;">${ticket.title}</h3>
            <p style="margin: 5px 0; color: var(--text-muted);">${ticket.price} Pi</p>
            <strong style="color: ${qtyColor};">${qtyText}</strong>
            <div style="margin-top: 10px; display:flex; gap:10px;">
              <button onclick="window.location.href='edit.html?id=${ticket.id}'" class="btn btn-primary" style="padding: 5px 10px; font-size: 14px;">${t('edit')}</button>
              <button onclick="deleteTicket(${ticket.id})" class="btn btn-danger" style="padding: 5px 10px; font-size: 14px;">${t('delete')}</button>
            </div>
          </div>
        </div>
      `;
    });
  }

  // 2. Load Orders (Purchases made by others from this seller)
  const { data: ordersData } = await db
    .from("orders")
    .select("*")
    .eq("seller", currentUser)
    .order("created_at", { ascending: false });

  el.innerHTML += `<h2 style="margin-top: 40px; border-top: 1px solid var(--glass-border); padding-top: 20px;">Bestellungen / Orders</h2>`;

  if (!ordersData || ordersData.length === 0) {
    el.innerHTML += "<div class='glass-panel' style='text-align:center;'>Noch keine Bestellungen erhalten. / No orders received yet.</div>";
    return;
  }

  ordersData.forEach(order => {
    let statusClass = order.status === 'shipped' ? 'status-shipped' : 'status-paid';
    let statusText = order.status === 'shipped' ? 'Versendet' : 'Bezahlt';

    let payoutHtml = '';
    const pStatus = order.payout_status || 'pending';
    if (pStatus === 'pending') {
      payoutHtml = `<button onclick="requestPayout('${order.id}')" class="btn btn-glass" style="margin-top:10px; width:100%; border:1px solid #fbbf24; color:#fbbf24;" data-i18n="requestPayout">💰 Auszahlung anfordern</button>`;
    } else if (pStatus === 'requested') {
      payoutHtml = `<div style="margin-top:10px; text-align:center; padding:10px; border-radius:10px; background:rgba(251,191,36,0.2); color:#fcd34d;" data-i18n="payoutRequested">⏳ Auszahlung angefragt</div>`;
    } else if (pStatus === 'paid') {
      payoutHtml = `<div style="margin-top:10px; text-align:center; padding:10px; border-radius:10px; background:rgba(16,185,129,0.2); color:#6ee7b7;" data-i18n="payoutDone">✅ Ausgezahlt</div>`;
    }

    el.innerHTML += `
      <div class="glass-panel" style="margin-bottom: 20px;">
        <div style="display: flex; justify-content: space-between; border-bottom: 1px solid var(--glass-border); padding-bottom: 10px; margin-bottom: 10px;">
          <strong>Order-ID: ${order.id.substring(0,8)}...</strong>
          <span style="padding: 5px 10px; border-radius: 8px; font-weight:bold; ${order.status==='shipped'?'background:rgba(16,185,129,0.2);color:#34d399;':'background:rgba(59,130,246,0.2);color:#60a5fa;'}">${statusText}</span>
        </div>
        <h3>${order.ticket_title || 'Ticket'}</h3>
        <p><strong>Käufer:</strong> ${order.buyer}</p>
        <p><strong>Menge:</strong> ${order.quantity} | <strong>Preis:</strong> ${order.total_price} Pi</p>
        <div style="margin-top: 15px;">
          <a href="order.html?id=${order.id}" class="btn btn-primary" style="width: 100%;">📄 ${t('orderDetails')} & Chat</a>
        </div>
        ${payoutHtml}
      </div>
    `;
  });
  
  setTimeout(applyTranslations, 100);
}

// ================= PAYOUT REQUEST =================
async function requestPayout(orderId) {
  if(confirm("Möchtest du die Auszahlung für diese Bestellung anfordern? / Request payout for this order?")) {
    await db.from("orders").update({ payout_status: 'requested' }).eq("id", orderId);
    loadSales();
  }
}

// ================= DELETE LOGIC =================
async function deleteTicket(id) {
  if(confirm(t('deleteConfirm'))) {
    await db.from("tickets").delete().eq("id", id);
    loadSales();
  }
}
</script>

</body>
</html>
