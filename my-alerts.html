<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meine Such-Abos</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<div class="bg-blob blob-1"></div>
<div class="bg-blob blob-2"></div>
<div class="container">
  
  <div class="header glass-panel">
    <a href="index.html" class="header-logo-container" style="text-decoration: none; cursor: pointer;">
      <img src="0ED2A097-4CDA-417A-A473-BCD55056B90E.png" alt="Logo" class="header-logo">
      <div>
        <h1 class="header-title">🎟️ Pi Ticket Marketplace</h1>
        <div id="user" style="color: #60a5fa; font-weight: 600; margin-top: 5px;"></div>
      </div>
    </a>
  </div>

  <div style="margin-bottom: 20px;">
    <a href="index.html" class="btn btn-glass">⬅ Zurück</a>
  </div>

  <div class="glass-panel" style="padding: 30px;">
    <h2>🔔 Meine Such-Abos</h2>
    <p style="color: var(--text-muted); margin-bottom: 20px;">
      Hier siehst du alle Suchbegriffe, die du abonniert hast. Du wirst automatisch benachrichtigt, sobald ein passendes Ticket hochgeladen wird.
    </p>

    <div id="alertsList" style="display: flex; flex-direction: column; gap: 15px;">
      <div style="text-align: center; color: var(--text-muted);">Lade...</div>
    </div>
  </div>

</div>

<!-- Floating Home Button -->
<a href="index.html" class="floating-home-btn" title="Zurück zur Startseite">🏠</a>

<script>
  const db = window.supabase.createClient(
    "https://rucejmhjgfvlntoxhczm.supabase.co",
    "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ1Y2VqbWhqZ2Z2bG50b3hoY3ptIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1NTU4OTcsImV4cCI6MjA5MDEzMTg5N30.Eq1vP38qyX0c-m23mceGg-gxZD_mn4sOyGqVxZMRoFk"
  );

  const currentUser = localStorage.getItem("pi_user") || null;

  if (currentUser) {
    document.getElementById("user").innerText = "👤 " + currentUser;
    loadAlerts();
  } else {
    document.getElementById("alertsList").innerHTML = "Bitte logge dich ein.";
  }

  async function loadAlerts() {
    const list = document.getElementById("alertsList");
    const { data, error } = await db.from("search_alerts").select("*").eq("user_id", currentUser).order("created_at", { ascending: false });
    
    if (error) {
      list.innerHTML = `<div style="color: var(--danger);">Fehler beim Laden: ${error.message}</div>`;
      return;
    }

    if (!data || data.length === 0) {
      list.innerHTML = `<div style="text-align: center; color: var(--text-muted); padding: 20px; background: rgba(0,0,0,0.2); border-radius: 10px;">Du hast noch keine Suchen abonniert.</div>`;
      return;
    }

    list.innerHTML = "";
    data.forEach(alert => {
      const date = new Date(alert.created_at).toLocaleDateString();
      list.innerHTML += `
        <div style="display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.3); padding: 15px 20px; border-radius: 10px; border: 1px solid var(--glass-border);">
          <div>
            <strong style="font-size: 18px; color: var(--text-main);">"${alert.keyword}"</strong>
            <div style="font-size: 12px; color: var(--text-muted); margin-top: 5px;">Abonniert am: ${date}</div>
          </div>
          <button class="btn btn-danger" style="padding: 8px 15px; font-size: 14px;" onclick="deleteAlert(${alert.id})">🗑️ Löschen</button>
        </div>
      `;
    });
  }

  async function deleteAlert(id) {
    if(!confirm("Bist du sicher, dass du dieses Abo löschen möchtest?")) return;
    
    const { error } = await db.from("search_alerts").delete().eq("id", id).eq("user_id", currentUser);
    
    if (error) {
      alert("Fehler beim Löschen: " + error.message);
    } else {
      loadAlerts();
    }
  }
</script>
</body>
</html>
