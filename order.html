<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Bestelldetails & Chat</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://sdk.minepi.com/pi-sdk.js"></script>

<link rel="stylesheet" href="style.css">
<script src="i18n.js"></script>

<style>
.section-card {
  background: var(--glass-bg);
  border: 1px solid var(--glass-border);
  border-radius: 15px;
  padding: 20px;
  margin-bottom: 20px;
}
.chat-box {
  background: rgba(0,0,0,0.3);
  height: 300px;
  border-radius: 10px;
  padding: 15px;
  overflow-y: auto;
  margin-bottom: 15px;
  border: 1px solid var(--glass-border);
}
.msg {
  padding: 10px;
  border-radius: 10px;
  margin-bottom: 10px;
  max-width: 80%;
}
.msg-mine {
  background: var(--primary);
  color: white;
  margin-left: auto;
}
.msg-other {
  background: #334155;
  color: white;
}
.rating-stars {
  font-size: 30px;
  cursor: pointer;
  color: #475569;
}
.rating-stars span.active {
  color: #fbbf24;
}
</style>
</head>
<body>

<div class="container">
  <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
    <button onclick="history.back()" class="btn btn-glass" data-i18n="back">⬅ Zurück</button>
    <div class="lang-toggle">
      <button class="lang-btn" id="lang-de" onclick="setLanguage('de'); window.location.reload();">🇩🇪</button>
      <button class="lang-btn" id="lang-en" onclick="setLanguage('en'); window.location.reload();">🇬🇧</button>
    </div>
  </div>

  <h1 data-i18n="orderDetails">Bestelldetails</h1>
  
  <div id="content">
    <div style="text-align: center;">Lade... / Loading...</div>
  </div>
</div>

<script>
let currentUser = localStorage.getItem("pi_user") || null;
const params = new URLSearchParams(window.location.search);
const orderId = params.get("id");

let currentOrder = null;

document.addEventListener("DOMContentLoaded", () => {
  document.getElementById("lang-de").classList.toggle("active", currentLang === "de");
  document.getElementById("lang-en").classList.toggle("active", currentLang === "en");

  if (!currentUser) {
    alert(t("notLoggedIn"));
    window.location.href = "index.html";
  } else {
    loadOrder();
  }
});

const db = window.supabase.createClient(
  "https://rucejmhjgfvlntoxhczm.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ1Y2VqbWhqZ2Z2bG50b3hoY3ptIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1NTU4OTcsImV4cCI6MjA5MDEzMTg5N30.Eq1vP38qyX0c-m23mceGg-gxZD_mn4sOyGqVxZMRoFk"
);

async function loadOrder() {
  const { data, error } = await db.from("orders").select("*").eq("id", orderId).single();
  if (error || !data) {
    document.getElementById("content").innerHTML = "Bestellung nicht gefunden / Order not found.";
    return;
  }
  
  currentOrder = data;
  renderOrder();
  loadMessages();
}

function renderOrder() {
  const isBuyer = currentOrder.buyer === currentUser;
  const isSeller = currentOrder.seller === currentUser;

  let html = `
    <div class="section-card">
      <h3>${currentOrder.ticket_title}</h3>
      <p><strong>Order ID:</strong> ${currentOrder.id}</p>
      <p><strong>Käufer:</strong> <a href="profile.html?user=${encodeURIComponent(currentOrder.buyer)}" style="color:var(--primary); text-decoration:none;">${currentOrder.buyer}</a> | <strong>Verkäufer:</strong> <a href="profile.html?user=${encodeURIComponent(currentOrder.seller)}" style="color:var(--primary); text-decoration:none;">${currentOrder.seller}</a></p>
      <p><strong>Menge:</strong> ${currentOrder.quantity} | <strong>Preis:</strong> ${currentOrder.total_price} Pi</p>
      <p><strong>Status:</strong> ${currentOrder.status === 'shipped' ? '📦 Versendet' : '✅ Bezahlt'}</p>
    </div>
  `;

  // Shipping Section
  html += `<div class="section-card">`;
  if (isBuyer) {
    html += `
      <h4>${t('shippingAddress')}</h4>
      <textarea id="shipAddr" rows="3">${currentOrder.shipping_address || ''}</textarea>
      <button class="btn btn-success" style="margin-top: 10px;" onclick="saveShippingAddress()">${t('saveAddress')}</button>
      
      ${currentOrder.tracking_number ? `<div style="margin-top:20px; padding:15px; background:rgba(255,255,255,0.1); border-radius:10px;">
        <strong>${t('trackingNumber')}:</strong> ${currentOrder.tracking_number}
      </div>` : ''}
    `;
  } else if (isSeller) {
    html += `
      <h4>Käufer Adresse / Buyer Address</h4>
      <div style="background: rgba(0,0,0,0.3); padding:15px; border-radius:10px; margin-bottom:15px;">
        ${currentOrder.shipping_address ? currentOrder.shipping_address.replace(/\\n/g, '<br>') : 'Noch keine Adresse hinterlegt / No address provided yet.'}
      </div>
      <h4>${t('trackingNumber')}</h4>
      <input type="text" id="trackNum" value="${currentOrder.tracking_number || ''}">
      <button class="btn btn-primary" style="margin-top: 10px;" onclick="markShipped()">${t('markShipped')}</button>
    `;
  }
  html += `</div>`;

  // Chat Section
  html += `
    <div class="section-card">
      <h4>${t('chat')}</h4>
      <div id="chatBox" class="chat-box"></div>
      <div style="display:flex; gap:10px;">
        <input type="text" id="chatMsg" placeholder="Nachricht eingeben..." onkeypress="if(event.key==='Enter') sendMessage()">
        <button class="btn btn-primary" onclick="sendMessage()">${t('send')}</button>
      </div>
    </div>
  `;

  // Rating Section (Only for buyer)
  if (isBuyer && currentOrder.status === 'shipped') {
    html += `
      <div class="section-card">
        <h4>${t('rateSeller')} (${currentOrder.seller})</h4>
        <div class="rating-stars" id="starContainer">
          <span onclick="setRating(1)">★</span>
          <span onclick="setRating(2)">★</span>
          <span onclick="setRating(3)">★</span>
          <span onclick="setRating(4)">★</span>
          <span onclick="setRating(5)">★</span>
        </div>
        <button class="btn btn-success" style="margin-top:10px;" onclick="submitRating()">${t('submitRating')}</button>
      </div>
    `;
  }

  document.getElementById("content").innerHTML = html;
}

// ================= SHIPPING LOGIC =================
async function saveShippingAddress() {
  const addr = document.getElementById("shipAddr").value;
  await db.from("orders").update({ shipping_address: addr }).eq("id", orderId);
  alert("Adresse gespeichert / Address saved!");
  loadOrder();
}

async function markShipped() {
  const track = document.getElementById("trackNum").value;
  await db.from("orders").update({ tracking_number: track, status: 'shipped' }).eq("id", orderId);
  alert("Als versendet markiert / Marked as shipped!");
  loadOrder();
}

// ================= CHAT LOGIC =================
async function loadMessages() {
  const { data } = await db.from("messages").select("*").eq("order_id", orderId).order("created_at", { ascending: true });
  const chatBox = document.getElementById("chatBox");
  if (!chatBox) return;

  chatBox.innerHTML = "";
  if (data) {
    data.forEach(m => {
      const isMine = m.sender === currentUser;
      chatBox.innerHTML += `
        <div class="msg ${isMine ? 'msg-mine' : 'msg-other'}">
          <small style="opacity:0.7; font-size:10px;">${m.sender}</small><br>
          ${m.content}
        </div>
      `;
    });
    chatBox.scrollTop = chatBox.scrollHeight;
  }
}

async function sendMessage() {
  const input = document.getElementById("chatMsg");
  const msg = input.value.trim();
  if (!msg) return;

  const receiver = currentOrder.buyer === currentUser ? currentOrder.seller : currentOrder.buyer;

  await db.from("messages").insert([
    { order_id: orderId, sender: currentUser, receiver: receiver, content: msg }
  ]);
  
  input.value = "";
  loadMessages();
}

// ================= RATING LOGIC =================
let selectedRating = 0;
function setRating(r) {
  selectedRating = r;
  const stars = document.getElementById("starContainer").querySelectorAll("span");
  stars.forEach((s, idx) => {
    if (idx < r) s.classList.add("active");
    else s.classList.remove("active");
  });
}

async function submitRating() {
  if (selectedRating === 0) {
    alert("Bitte wähle 1-5 Sterne / Please select 1-5 stars");
    return;
  }
  
  // Check if already rated
  const { data: existing } = await db.from("ratings").select("*").eq("seller", currentOrder.seller).eq("buyer", currentUser);
  
  if (existing && existing.length > 0) {
    await db.from("ratings").update({ rating: selectedRating }).eq("id", existing[0].id);
  } else {
    await db.from("ratings").insert([
      { seller: currentOrder.seller, buyer: currentUser, rating: selectedRating }
    ]);
  }
  alert("Bewertung gespeichert! / Rating saved!");
}
</script>
</body>
</html>
