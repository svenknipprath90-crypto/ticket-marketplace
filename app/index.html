<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ticket Marketplace Pi</title>

    <script src="https://sdk.minepi.com/pi-sdk.js"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 20px;
            background: #f4f7f6;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-width: 350px;
            margin: auto;
        }

        h1 {
            color: #673ab7;
        }

        #user-info {
            font-weight: bold;
            margin-bottom: 20px;
            color: #333;
            font-size: 1.2em;
            min-height: 1.5em;
        }

        .btn {
            width: 100%;
            padding: 15px;
            background: #673ab7;
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            font-size: 1.1em;
        }

        .btn:hover {
            background: #5a2ea6;
        }

        #status {
            margin-top: 20px;
            font-size: 0.9em;
            color: #666;
        }
    </style>
</head>

<body>
    <div class="card">
        <h1>🎟️ Ticket Marketplace</h1>

        <div id="user-info">Connecting to Pi...</div>

        <button class="btn" onclick="startPayment()">
            Pay 0.1 Pi
        </button>

        <div id="status">Waiting for Pi...</div>
    </div>

    <script>
        const statusEl = document.getElementById('status');
        const userEl = document.getElementById('user-info');

        let currentUser = null;

        async function initPi() {
            try {
                await Pi.init({ version: "1.5.0" });

                const auth = await Pi.authenticate(['payments'], onIncompletePayment);

                if (auth && auth.user && auth.user.username) {
                    currentUser = auth.user;
                    userEl.innerText = "Hello " + auth.user.username;
                } else {
                    userEl.innerText = "User loaded";
                }

                statusEl.innerText = "Ready for payment";

            } catch (err) {
                console.error(err);
                userEl.innerText = "Open in Pi Browser";
                statusEl.innerText = "Login required";
            }
        }

        async function startPayment() {
            statusEl.innerText = "Opening wallet...";

            try {
                await Pi.createPayment({
                    amount: 0.1,
                    memo: "Ticket Purchase",
                    metadata: {
                        orderId: "ORDER-" + Date.now()
                    }
                }, {
                    onReadyForServerApproval: async (paymentId) => {
                        return fetch('/.netlify/functions/approve-payment', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                paymentId: paymentId,
                                action: 'approve'
                            })
                        });
                    },

                    onReadyForServerCompletion: async (paymentId, txid) => {
                        statusEl.innerText = "Completing payment...";

                        return fetch('/.netlify/functions/approve-payment', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                paymentId: paymentId,
                                action: 'complete',
                                txid: txid
                            })
                        });
                    },

                    onCancel: () => {
                        statusEl.innerText = "Payment cancelled";
                    },

                    onError: (error) => {
                        console.error(error);
                        statusEl.innerText = "Error: " + error.message;
                    }
                });

            } catch (err) {
                console.error(err);
                statusEl.innerText = "Error: " + err.message;
            }
        }

        function onIncompletePayment(payment) {
            console.log("Incomplete payment detected:", payment);

            return fetch('/.netlify/functions/approve-payment', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    paymentId: payment.identifier,
                    action: 'complete'
                })
            });
        }

        initPi();
    </script>
</body>
</html>
