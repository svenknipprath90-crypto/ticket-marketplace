<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ticket Marketplace Pi</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background-color: #f0f2f5; }
        .container { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); max-width: 400px; margin: auto; }
        .btn-pay { width: 100%; padding: 15px; background: #673ab7; color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
        #status-text { margin-top: 20px; font-weight: bold; color: #673ab7; }
        #debug-text { margin-top: 10px; font-size: 11px; color: red; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎟️ Ticket Marketplace</h1>
        <p>System-Check: Version 4.0 (Final)</p>
        <button class="btn-pay" onclick="pay()">Ticket kaufen (0.1 Pi)</button>
        <div id="status-text">Prüfe Pi-Umgebung...</div>
        <div id="debug-text"></div>
    </div>

    <script>
        const statusEl = document.getElementById('status-text');
        const debugEl = document.getElementById('debug-text');

        window.onload = function() {
            if (typeof Pi !== 'undefined') {
                try {
                    // Wir nutzen die absolute Basis-Initialisierung ohne Schnickschnack
                    Pi.init({ version: "1.5" }); 
                    statusEl.innerText = "✅ Pi System bereit!";
                    
                    Pi.authenticate(['payments'], function(payment) {
                        fetch('/api/approve-payment', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ paymentId: payment.identifier, action: 'complete' })
                        });
                    }).catch(function(e) {
                        debugEl.innerText = "Auth-Info: " + e.message;
                    });
                } catch (err) {
                    debugEl.innerText = "Init-Fehler: " + err.message;
                }
            } else {
                statusEl.innerText = "SDK fehlt - bitte im Pi Browser öffnen!";
            }
        };

        function pay() {
            try {
                Pi.createPayment({
                    amount: 0.1,
                    memo: "Ticket Kauf",
                    metadata: { orderId: "123" }
                }, {
                    onReadyForServerApproval: function(id) {
                        statusEl.innerText = "Genehmigung...";
                        fetch('/api/approve-payment', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ paymentId: id, action: 'approve' })
                        });
                    },
                    onReadyForServerCompletion: function(id, txid) {
                        statusEl.innerText = "Abgeschlossen!";
                        fetch('/api/approve-payment', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ paymentId: id, action: 'complete', txid: txid })
                        });
                        alert("Erfolg!");
                    },
                    onCancel: function() { statusEl.innerText = "Abgebrochen."; },
                    onError: function(e) { debugEl.innerText = "Zahlungsfehler: " + e.message; }
                });
            } catch (e) {
                debugEl.innerText = "Fehler: " + e.message;
            }
        }
    </script>
</body>
</html>
