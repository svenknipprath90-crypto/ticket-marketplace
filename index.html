<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Pi Ticket Marketplace</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
  margin:0;
  font-family:sans-serif;
  background:#0b1220;
  color:white;
}

.header {
  padding:20px;
  font-size:22px;
  font-weight:bold;
}

.user {
  padding:10px 20px;
  font-size:14px;
  color:#9ca3af;
}

.container {
  padding:15px;
}

.button {
  display:inline-block;
  margin-bottom:20px;
  margin-right:10px;
  padding:12px 18px;
  background:#2563eb;
  color:white;
  border-radius:10px;
  text-decoration:none;
  font-weight:bold;
}

.logout {
  background:#dc2626;
}

.card {
  background:#1e293b;
  border-radius:15px;
  overflow:hidden;
  margin-bottom:20px;
  position:relative;
}

.card img {
  width:100%;
  height:220px;
  object-fit:cover;
}

.card-content {
  padding:15px;
}
</style>
</head>

<body>

<div class="header">Pi Ticket Marketplace</div>

<div id="user" class="user">Lade User...</div>

<div class="container">

<a href="login.html" class="button">Login</a>
<button class="button logout" onclick="logout()">Logout</button>
<a href="create.html" class="button">➕ Ticket</a>
<a href="favorites.html" class="button">❤️ Favoriten</a>

<div id="tickets"></div>

</div>

<script>

const db = window.supabase.createClient(
  "https://rucejmhjgfvlntoxhczm.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
);

// USER ANZEIGEN
async function loadUser() {
  const { data } = await db.auth.getUser();

  const el = document.getElementById("user");

  if (data.user) {
    el.innerText = "👤 " + data.user.email;
  } else {
    el.innerText = "Nicht eingeloggt";
  }
}

// LOGOUT
async function logout() {
  await db.auth.signOut();
  location.reload();
}

// TICKETS LADEN
async function loadTickets() {

  const { data } = await db.from("tickets").select("*");

  const container = document.getElementById("tickets");
  container.innerHTML = "";

  data.forEach(ticket => {

    const div = document.createElement("div");

    div.className = "card";

    div.innerHTML = `
      ${ticket.image ? `<img src="${ticket.image}">` : ""}
      <div class="card-content">
        <b>${ticket.title}</b><br>
        ${ticket.price} Pi
      </div>
    `;

    container.appendChild(div);

  });

}

loadUser();
loadTickets();

</script>

</body>
</html>
