<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ticket Marketplace</title>
  <script src="https://sdk.minepi.com/pi-sdk.js"></script>
  <style>
    :root {
      --bg: #f4f4f6;
      --card: #ffffff;
      --text: #1f1f1f;
      --muted: #666;
      --purple: #6f2dbd;
      --gold: #f0ad3d;
      --border: #ddd;
      --danger: #c0392b;
      --success: #1e8e3e;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 20px;
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .container {
      max-width: 720px;
      margin: 0 auto;
    }

    h1 {
      margin: 0 0 16px 0;
      color: var(--purple);
      font-size: 42px;
      line-height: 1.1;
    }

    h2 {
      margin-top: 0;
    }

    .card {
      background: var(--card);
      border-radius: 18px;
      padding: 20px;
      margin-bottom: 18px;
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.07);
    }

    .status {
      font-size: 16px;
      margin-bottom: 12px;
    }

    .muted {
      color: var(--muted);
    }

    .row {
      display: grid;
      gap: 12px;
    }

    input, textarea {
      width: 100%;
      padding: 14px;
      border: 2px solid var(--border);
      border-radius: 12px;
      font-size: 16px;
      background: #fff;
    }

    textarea {
      resize: vertical;
      min-height: 90px;
    }

    button {
      width: 100%;
      border: none;
      border-radius: 12px;
      padding: 15px 18px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
    }

    .btn-primary {
      background: var(--purple);
      color: #fff;
    }

    .btn-gold {
      background: var(--gold);
      color: #fff;
    }

    .ticket {
      border: 1px solid #eee;
      border-radius: 14px;
      padding: 16px;
      margin-top: 12px;
    }

    .ticket h3 {
      margin: 0 0 8px 0;
      font-size: 24px;
    }

    .ticket p {
      margin: 6px 0;
    }

    .fee {
      color: var(--danger);
      font-weight: 700;
    }

    .success {
      color: var(--success);
      font-weight: 700;
    }

    .inline-note {
      font-size: 14px;
      color: var(--muted);
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Ticket Marketplace</h1>

    <div class="card">
      <div id="loginStatus" class="status">Not logged in</div>
      <button id="loginBtn" class="btn-primary">Login with Pi</button>
      <div class="inline-note">
        Sandbox/Testnet is enabled. Login and payments run through the Pi SDK in the Pi Browser.
      </div>
    </div>

    <div class="card">
      <h2>List a Ticket</h2>
      <div class="row">
        <input id="eventName" type="text" placeholder="Event name" />
        <input id="ticketPrice" type="number" step="0.01" min="0.01" placeholder="Price in Pi" />
        <textarea id="ticketDesc" placeholder="Short description"></textarea>
        <button id="listBtn" class="btn-gold">List Ticket</button>
      </div>
      <div class="inline-note">
        Current platform fee demo: 8%.
      </div>
    </div>

    <div class="card">
      <h2>Available Tickets</h2>
      <div id="ticketList" class="muted">No tickets available yet.</div>
    </div>
  </div>

  <script>
    const Pi = window.Pi;
    Pi.init({ version: "2.0", sandbox: true });

    let currentUser = null;
    let accessToken = null;

    const STORAGE_KEY = "ticket_marketplace_demo_v2_en";

    function getTickets() {
      try {
        return JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
      } catch {
        return [];
      }
    }

    function setTickets(tickets) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(tickets));
    }

    function escapeHtml(str) {
      return String(str)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function renderTickets() {
      const container = document.getElementById("ticketList");
      const tickets = getTickets().filter(t => !t.sold);

      if (!tickets.length) {
        container.innerHTML = '<div class="muted">No tickets available yet.</div>';
        return;
      }

      container.innerHTML = tickets.map((ticket) => {
        const fee = ticket.price * 0.08;
        const sellerGets = ticket.price - fee;

        return `
          <div class="ticket">
            <h3>${escapeHtml(ticket.eventName)}</h3>
            <p>${escapeHtml(ticket.description || "No description provided")}</p>
            <p><strong>Price:</strong> ${ticket.price.toFixed(2)} Pi</p>
            <p class="fee">Platform fee: ${fee.toFixed(2)} Pi</p>
            <p><strong>Seller receives:</strong> ${sellerGets.toFixed(2)} Pi</p>
            <p class="muted">Listed by: ${escapeHtml(ticket.owner || "Unknown")}</p>
            <button class="btn-gold" onclick="buyTicket(${ticket.id})">Buy with Pi</button>
          </div>
        `;
      }).join("");
    }

    async function loginWithPi() {
      try {
        const scopes = ["username", "payments"];

        function onIncompletePaymentFound(payment) {
          console.log("Incomplete payment found:", payment);
        }

        const auth = await Pi.authenticate(scopes, onIncompletePaymentFound);
        currentUser = auth.user;
        accessToken = auth.accessToken;

        document.getElementById("loginStatus").innerHTML =
          `<span class="success">Logged in as: ${escapeHtml(currentUser.username || "Pi User")}</span>`;
      } catch (error) {
        console.error("Login failed:", error);
        alert("Pi login failed.");
      }
    }

    function listTicket() {
      if (!currentUser) {
        alert("Please log in with Pi first.");
        return;
      }

      const eventName = document.getElementById("eventName").value.trim();
      const price = parseFloat(document.getElementById("ticketPrice").value);
      const description = document.getElementById("ticketDesc").value.trim();

      if (!eventName || !price || price <= 0) {
        alert("Please enter an event name and a valid price.");
        return;
      }

      const tickets = getTickets();
      tickets.unshift({
        id: Date.now(),
        eventName,
        price,
        description,
        owner: currentUser.username || "Pi User",
        sold: false
      });

      setTickets(tickets);

      document.getElementById("eventName").value = "";
      document.getElementById("ticketPrice").value = "";
      document.getElementById("ticketDesc").value = "";

      renderTickets();
    }

    async function buyTicket(ticketId) {
      if (!currentUser) {
        alert("Please log in with Pi first.");
        return;
      }

      const tickets = getTickets();
      const ticket = tickets.find(t => t.id === ticketId);

      if (!ticket) {
        alert("Ticket not found.");
        return;
      }

      try {
        const paymentData = {
          amount: Number(ticket.price.toFixed(2)),
          memo: `Ticket purchase: ${ticket.eventName}`,
          metadata: {
            ticketId: ticket.id,
            eventName: ticket.eventName,
            seller: ticket.owner
          }
        };

        const paymentCallbacks = {
          onReadyForServerApproval(paymentId) {
            console.log("Ready for server approval:", paymentId);
          },
          onReadyForServerCompletion(paymentId, txid) {
            console.log("Ready for completion:", paymentId, txid);
            const updated = getTickets().map(t =>
              t.id === ticketId ? { ...t, sold: true, txid: txid || null } : t
            );
            setTickets(updated);
            renderTickets();
            alert("Payment successful (Sandbox/Demo).");
          },
          onCancel(paymentId) {
            console.log("Payment cancelled:", paymentId);
            alert("Payment cancelled.");
          },
          onError(error, payment) {
            console.error("Payment error:", error, payment);
            alert("Payment error.");
          }
        };

        await Pi.createPayment(paymentData, paymentCallbacks);
      } catch (error) {
        console.error("createPayment error:", error);
        alert("Pi payment could not be started.");
      }
    }

    document.getElementById("loginBtn").addEventListener("click", loginWithPi);
    document.getElementById("listBtn").addEventListener("click", listTicket);

    renderTickets();
  </script>
</body>
</html>
