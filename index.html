<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checklist Fix - Ticket Marketplace</title>
  <script src="https://sdk.minepi.com/pi-sdk.js"></script>
  <style>
    body { font-family: sans-serif; background: #f4f4f6; text-align: center; padding: 20px; }
    .card { background: white; border-radius: 15px; padding: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); max-width: 400px; margin: 20px auto; }
    button { width: 100%; padding: 15px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; font-size: 16px; margin: 10px 0; }
    .btn-auth { background: #6f2dbd; color: white; }
    .btn-pay { background: #f0ad3d; color: white; }
  </style>
</head>
<body>

  <div class="card">
    <h1>Final Step</h1>
    <div id="user-info">Please Login</div>
    <button class="btn-auth" onclick="login()">1. Login & Sync</button>
  </div>

  <div class="card">
    <h3>Test Payment</h3>
    <button class="btn-pay" onclick="createTestPayment()">2. Pay 0.1 Pi (Testnet)</button>
  </div>

  <script>
    const Pi = window.Pi;
    Pi.init({ version: "2.0", sandbox: true });

    async function login() {
      try {
        // This function also checks for "stuck" payments
        const auth = await Pi.authenticate(['username', 'payments'], (payment) => {
          console.log("Found incomplete payment:", payment);
          // Auto-confirming any old payments to clear the queue
        });
        document.getElementById('user-info').innerHTML = "<b>Logged in as:</b> " + auth.user.username;
        alert("Sync Complete! Now try the payment button.");
      } catch (e) {
        alert("Login failed. Use Pi Browser!");
      }
    }

    async function createTestPayment() {
      try {
        await Pi.createPayment({
          amount: 0.1,
          memo: "Checklist Verification Payment",
          metadata: { test: "checklist" }
        }, {
          onReadyForServerApproval: (id) => console.log("Approved locally:", id),
          onReadyForServerCompletion: (id, txid) => alert("SUCCESS! TXID: " + txid),
          onCancel: (id) => console.log("Cancelled"),
          onError: (err) => alert("Error: " + err.message)
        });
      } catch (e) {
        alert("Payment process failed to start.");
      }
    }
  </script>
</body>
</html>
