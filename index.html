<!DOCTYPE html>
<html>
<head>
  <title>Pi Ticket Marketplace</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
</head>

<body style="font-family: Arial; background:#0f172a; color:white; text-align:center;">

<!-- HEADER -->
<header style="display:flex; align-items:center; justify-content:space-between; padding:15px; background:rgba(255,255,255,0.05);">

  <div style="display:flex; align-items:center; gap:10px;">
    <img src="0ED2A097-4CDA-417A-A473-BCD55056B90E.png" style="width:40px;">
    <h2>Pi Ticket Marketplace</h2>
  </div>

  <button onclick="goCreate()" style="padding:10px 15px; background:#6366f1; border:none; border-radius:8px; color:white;">
    + Create
  </button>

</header>

<h3>All Tickets</h3>

<div id="marketplace"></div>

<script>

// ✅ DEINE SUPABASE VERBINDUNG (FERTIG EINGETRAGEN)
const supabase = window.supabase.createClient(
  "https://rucejmhjgfvlntoxhczm.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ1Y2VqbWhqZ2Z2bG50b3hoY3ptIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1NTU4OTcsImV4cCI6MjA5MDEzMTg5N30.Eq1vP38qyX0c-m23mceGg-gxZD_mn4sOyGqVxZMRoFk"
);

// ➡️ Navigation
function goCreate() {
  window.location.href = "create.html";
}

// 📥 Tickets laden
async function loadTickets() {
  const { data, error } = await supabase
    .from("tickets")
    .select("*");

  if (error) {
    console.log(error);
    return [];
  }

  return data;
}

// 🎨 Tickets anzeigen
async function renderTickets() {
  const tickets = await loadTickets();

  const container = document.getElementById("marketplace");
  container.innerHTML = "";

  if (tickets.length === 0) {
    container.innerHTML = "<p>No tickets yet</p>";
    return;
  }

  tickets.forEach((t) => {
    container.innerHTML += `
      <div style="background:#1e293b; margin:15px; padding:15px; border-radius:12px;">
        <h3>${t.title}</h3>
        <p>${t.category} → ${t.subcategory}</p>
        <p><b>${t.price} Pi</b></p>
        <p>${t.description}</p>
      </div>
    `;
  });
}

// 🚀 Start
renderTickets();

</script>

</body>
</html>
