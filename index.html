<!DOCTYPE html>
<html>
<head>
  <title>Pi Ticket Marketplace</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
</head>

<body style="margin:0; font-family: Arial; background:#0f172a; color:white;">

<header style="display:flex; justify-content:space-between; align-items:center; padding:15px; background:#111827;">

  <div style="display:flex; align-items:center; gap:10px;">
    <img src="0ED2A097-4CDA-417A-A473-BCD55056B90E.png" style="width:35px;">
    <h2 style="margin:0;">Pi Ticket Marketplace</h2>
  </div>

  <button onclick="window.location.href='create.html'" style="
    background:#6366f1;
    color:white;
    border:none;
    padding:10px 15px;
    border-radius:8px;
  ">
    + Create
  </button>

</header>

<div style="padding:15px;">
  <h3>All Tickets</h3>
  <div id="marketplace"></div>
</div>

<script>
const supabase = window.supabase.createClient(
  "https://rucejmhjgfvlntoxhczm.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
);

async function renderTickets() {
  const { data } = await supabase.from("tickets").select("*");
  const container = document.getElementById("marketplace");

  if (!data || data.length === 0) {
    container.innerHTML = "No tickets yet";
    return;
  }

  data.forEach(t => {
    container.innerHTML += `<p>${t.title} - ${t.price} Pi</p>`;
  });
}

renderTickets();
</script>

</body>
</html>
