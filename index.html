<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Pi Ticket Marketplace</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
  margin:0;
  font-family:sans-serif;
  background:#0b1220;
  color:white;
}
.header {
  padding:20px;
  font-size:22px;
  font-weight:bold;
}
.container {
  padding:15px;
}
.button {
  display:inline-block;
  margin-bottom:10px;
  margin-right:10px;
  padding:10px 15px;
  background:#2563eb;
  color:white;
  border-radius:10px;
  text-decoration:none;
}
.card {
  background:#1e293b;
  border-radius:15px;
  overflow:hidden;
  margin-bottom:20px;
}
.card img {
  width:100%;
  height:220px;
  object-fit:cover;
}
.card-content {
  padding:15px;
}
</style>
</head>

<body>

<div class="header">Pi Ticket Marketplace</div>

<div class="container">

<a href="create.html" class="button">➕ Ticket</a>
<a href="favorites.html" class="button">❤️ Favoriten</a>

<div id="tickets">Lade Tickets...</div>

</div>

<script>

const db = window.supabase.createClient(
  "https://rucejmhjgfvlntoxhczm.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ1Y2VqbWhqZ2Z2bG50b3hoY3ptIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1NTU4OTcsImV4cCI6MjA5MDEzMTg5N30.Eq1vP38qyX0c-m23mceGg-gxZD_mn4sOyGqVxZMRoFk"
);

async function loadTickets() {
  const { data, error } = await db.from("tickets").select("*");

  const el = document.getElementById("tickets");

  if (error) {
    el.innerText = "Fehler: " + error.message;
    return;
  }

  if (!data || data.length === 0) {
    el.innerText = "Keine Tickets";
    return;
  }

  el.innerHTML = "";

  data.forEach(t => {
    el.innerHTML += `
      <div class="card">
        ${t.image ? `<img src="${t.image}">` : ""}
        <div class="card-content">
          <b>${t.title}</b><br>
          ${t.price} Pi
        </div>
      </div>
    `;
  });
}

loadTickets();

</script>

</body>
</html>
