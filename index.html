<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ticket Marketplace</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background: #f0f2f5; color: #333; }
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 350px; margin: auto; }
        .btn { width: 100%; padding: 15px; background: #673ab7; color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 1.1em; margin-top: 20px; }
        #status { margin-top: 20px; font-weight: bold; color: #673ab7; }
        #user-info { font-size: 1em; color: #555; margin-bottom: 15px; padding: 10px; background: #eee; border-radius: 10px; }
    </style>
</head>
<body>
    <div class="card">
        <h1>🎟️ Ticket Shop</h1>
        <div id="user-info">Prüfe Login...</div>
        <div id="status">Warte auf Pi Network...</div>
        
        <button class="btn" onclick="startPayment()">JETZT BEZAHLEN (0.1 Pi)</button>
    </div>

    <script>
        const statusEl = document.getElementById('status');
        const userEl = document.getElementById('user-info');

        // Startet sofort beim Laden
        window.onload = async function() {
            try {
                // Initialisierung
                await Pi.init({ version: "1.5" });
                statusEl.innerText = "System bereit";

                // Login erzwingen (damit Username erscheint)
                const auth = await Pi.authenticate(['payments'], onIncompletePayment);
                userEl.innerText = "👤 " + auth.user.username;
                statusEl.innerText = "Bereit zum Kauf";
            } catch (err) {
                // Falls Init fehlschlägt, zeigen wir es an, versuchen aber den Login trotzdem
                statusEl.innerText = "Verbindung eingeschränkt";
                console.log("Init Fehler, versuche Login...");
                try {
                    const auth = await Pi.authenticate(['payments'], onIncompletePayment);
                    userEl.innerText = "👤 " + auth.user.username;
                } catch(e) {
                    userEl.innerText = "Login erforderlich";
                }
            }
        };

        async function startPayment() {
            statusEl.innerText = "Öffne Wallet...";
            try {
                const payment = await Pi.createPayment({
                    amount: 0.1,
                    memo: "Ticket Kauf",
                    metadata: { order: "ticket_123" }
                }, {
                    onReadyForServerApproval: (id) => {
                        return fetch('/api/approve-payment', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ paymentId: id, action: 'approve' })
                        });
                    },
                    onReadyForServerCompletion: (id, txid) => {
                        statusEl.innerText = "✅ Erfolg!";
                        return fetch('/api/approve-payment', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ paymentId: id, action: 'complete', txid: txid })
                        });
                    },
                    onCancel: () => { statusEl.innerText = "Abgebrochen"; },
                    onError: (e) => { statusEl.innerText = "Fehler: " + e.message; }
                });
            } catch (err) {
                statusEl.innerText = "Fehler: " + err.message;
            }
        }

        function onIncompletePayment(payment) {
            return fetch('/api/approve-payment', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ paymentId: payment.identifier, action: 'complete' })
            });
        }
    </script>
</body>
</html>
