<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Pi Ticket Marketplace</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
  margin:0;
  font-family:sans-serif;
  background:#0b1220;
  color:white;
}

.header {
  padding:20px;
  font-size:22px;
  font-weight:bold;
}

.top-buttons {
  padding:15px;
}

.button {
  display:inline-block;
  margin-right:10px;
  padding:12px 18px;
  background:#2563eb;
  color:white;
  border-radius:10px;
  text-decoration:none;
  font-weight:bold;
}

#tickets {
  padding:15px;
}

.card {
  background:#1e293b;
  border-radius:15px;
  overflow:hidden;
  margin-bottom:20px;
}

.card img {
  width:100%;
  height:220px;
  object-fit:cover;
}

.card-content {
  padding:15px;
}

.like {
  cursor:pointer;
  font-size:22px;
}

.liked {
  color:red;
}
</style>
</head>

<body>

<div class="header">Pi Ticket Marketplace</div>

<div class="top-buttons">
  <a href="create.html" class="button">➕ Ticket erstellen</a>
  <a href="favorites.html" class="button">❤️ Favoriten</a>
</div>

<div id="tickets"></div>

<script>

const db = window.supabase.createClient(
  "https://rucejmhjgfvlntoxhczm.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ1Y2VqbWhqZ2Z2bG50b3hoY3ptIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1NTU4OTcsImV4cCI6MjA5MDEzMTg5N30.Eq1vP38qyX0c-m23mceGg-gxZD_mn4sOyGqVxZMRoFk"
);

let allTickets = [];

function getFavorites() {
  return JSON.parse(localStorage.getItem("favorites")) || [];
}

function isFavorite(id) {
  return getFavorites().some(t => t.id === id);
}

function toggleFavorite(id) {

  let favs = getFavorites();

  const ticket = allTickets.find(t => t.id === id);

  if (!ticket) return;

  if (isFavorite(id)) {
    favs = favs.filter(t => t.id !== id);
  } else {
    favs.push(ticket);
  }

  localStorage.setItem("favorites", JSON.stringify(favs));

  loadTickets(); // neu rendern
}

async function loadTickets() {

  const { data } = await db
    .from("tickets")
    .select("*")
    .order("created_at", { ascending: false });

  allTickets = data;

  const el = document.getElementById("tickets");
  el.innerHTML = "";

  data.forEach(t => {

    const likedClass = isFavorite(t.id) ? "liked" : "";

    el.innerHTML += `
      <div class="card">
        ${t.image ? `<img src="${t.image}">` : ""}
        <div class="card-content">
          <h3>${t.title}</h3>
          <p>${t.category}</p>
          <p>${t.description}</p>
          <strong>${t.price} Pi</strong>
          <br><br>
          <span class="like ${likedClass}" onclick="toggleFavorite('${t.id}')">
            ❤️
          </span>
        </div>
      </div>
    `;
  });

}

loadTickets();

</script>

</body>
</html>
