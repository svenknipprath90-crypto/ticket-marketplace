<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Pi Ticket Marketplace</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body style="background:#0b1220;color:white;font-family:sans-serif;padding:20px;">

<h1>Pi Ticket Marketplace</h1>

<div id="tickets"></div>

<script>

// Supabase einmal erstellen
if (!window.db) {
  window.db = window.supabase.createClient(
    "https://rucejmhjgfvlntoxhczm.supabase.co",
    "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ1Y2VqbWhqZ2Z2bG50b3hoY3ptIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1NTU4OTcsImV4cCI6MjA5MDEzMTg5N30.Eq1vP38qyX0c-m23mceGg-gxZD_mn4sOyGqVxZMRoFk"
  );
}

const db = window.db;

async function loadTickets() {

  const { data, error } = await db
    .from("tickets")
    .select("*")
    .order("created_at", { ascending: false });

  if (error) {
    alert(error.message);
    return;
  }

  const container = document.getElementById("tickets");
  container.innerHTML = "";

  data.forEach(ticket => {

    const div = document.createElement("div");

    div.style.background = "#1e293b";
    div.style.padding = "20px";
    div.style.marginBottom = "20px";
    div.style.borderRadius = "10px";

    div.innerHTML = `
      ${ticket.image ? `<img src="${ticket.image}" style="width:100%;border-radius:10px;margin-bottom:10px;">` : ""}
      <h2>${ticket.title}</h2>
      <p>${ticket.category}</p>
      <p>${ticket.description}</p>
      <p><strong>${ticket.price} Pi</strong></p>
    `;

    container.appendChild(div);

  });

}

loadTickets();

</script>

</body>
</html>
