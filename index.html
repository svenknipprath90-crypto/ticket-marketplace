<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ticket Marketplace Pi</title>

  <!-- Pi SDK -->
  <script src="https://sdk.minepi.com/pi-sdk.js"></script>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #f4f7f6;
      padding: 20px;
    }

    .card {
      background: white;
      padding: 30px;
      border-radius: 20px;
      max-width: 350px;
      margin: auto;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }

    h1 { color: #673ab7; }

    .btn {
      width: 100%;
      padding: 15px;
      background: #673ab7;
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 18px;
      cursor: pointer;
    }

    #status { margin-top: 20px; color: #666; }
  </style>
</head>

<body>

<div class="card">
  <h1>🎟️ Ticket Marketplace</h1>

  <div id="user">Loading...</div>

  <button class="btn" onclick="pay()">Buy Ticket (0.1 Pi)</button>

  <div id="status">Waiting...</div>
</div>

<script>
let piReady = false;

async function initPi() {
  try {
    // 🔥 WICHTIG: warten bis SDK da ist
    let tries = 0;
    while (typeof Pi === "undefined" && tries < 10) {
      await new Promise(r => setTimeout(r, 300));
      tries++;
    }

    if (typeof Pi === "undefined") {
      document.getElementById("user").innerText = "Open in Pi Browser";
      return;
    }

    await Pi.init({ version: "1.5.0" });

    const auth = await Pi.authenticate(['payments'], onIncompletePayment);

    const username =
      auth?.user?.username ||
      auth?.user?.uid ||
      "Pi User";

    document.getElementById("user").innerText = "Hello " + username;
    document.getElementById("status").innerText = "Ready";

    piReady = true;

  } catch (e) {
    console.error(e);
    document.getElementById("user").innerText = "Login failed";
  }
}

async function pay() {
  if (!piReady) {
    document.getElementById("status").innerText = "Pi not ready";
    return;
  }

  try {
    await Pi.createPayment({
      amount: 0.1,
      memo: "Ticket Purchase",
      metadata: { orderId: Date.now() }
    }, {
      onReadyForServerApproval: (paymentId) => {
        return fetch('/.netlify/functions/approve-payment', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ paymentId, action: 'approve' })
        });
      },

      onReadyForServerCompletion: (paymentId, txid) => {
        return fetch('/.netlify/functions/approve-payment', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ paymentId, action: 'complete', txid })
        });
      },

      onCancel: () => {
        document.getElementById("status").innerText = "Cancelled";
      },

      onError: (err) => {
        document.getElementById("status").innerText = err.message;
      }
    });

  } catch (err) {
    document.getElementById("status").innerText = err.message;
  }
}

function onIncompletePayment(payment) {
  return fetch('/.netlify/functions/approve-payment', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      paymentId: payment.identifier,
      action: 'complete'
    })
  });
}

// START
initPi();
</script>

</body>
</html>
