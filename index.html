<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ticket Marketplace</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background: #f0f2f5; }
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 350px; margin: auto; }
        .btn { width: 100%; padding: 15px; background: #673ab7; color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 1.1em; }
        #status { margin-top: 20px; font-weight: bold; color: #673ab7; }
    </style>
</head>
<body>
    <div class="card">
        <h1>🎟️ Ticket Shop</h1>
        <p>Klicke unten, um Pi zu verbinden und zu zahlen.</p>
        <button class="btn" onclick="startProcess()">JETZT BEZAHLEN (0.1 Pi)</button>
        <div id="status">Bereit</div>
    </div>

    <script>
        const statusEl = document.getElementById('status');

        // Wir initialisieren ohne feste Versionsnummer im Script-Body
        try {
            Pi.init({ version: "1" }); 
        } catch(e) { console.log("Init silent"); }

        async function startProcess() {
            statusEl.innerText = "Verbinde mit Pi Wallet...";
            try {
                // Authentifizierung direkt beim Klick
                const auth = await Pi.authenticate(['payments'], onIncompletePayment);
                
                statusEl.innerText = "Zahlung wird gestartet...";
                
                Pi.createPayment({
                    amount: 0.1,
                    memo: "Ticket Kauf",
                    metadata: { type: "ticket_sale" }
                }, {
                    onReadyForServerApproval: (id) => {
                        statusEl.innerText = "Warte auf Server...";
                        fetch('/api/approve-payment', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ paymentId: id, action: 'approve' })
                        });
                    },
                    onReadyForServerCompletion: (id, txid) => {
                        statusEl.innerText = "Zahlung fertig!";
                        fetch('/api/approve-payment', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ paymentId: id, action: 'complete', txid: txid })
                        });
                        alert("Erfolg! Transaktion: " + txid);
                    },
                    onCancel: () => { statusEl.innerText = "Abgebrochen"; },
                    onError: (e) => { statusEl.innerText = "Fehler: " + e.message; }
                });
            } catch (err) {
                statusEl.innerText = "Fehler: " + err.message;
            }
        }

        function onIncompletePayment(payment) {
            fetch('/api/approve-payment', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ paymentId: payment.identifier, action: 'complete' })
            });
        }
    </script>
</body>
</html>
