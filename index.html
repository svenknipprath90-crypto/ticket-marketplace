<!DOCTYPE html>
<html>
<head>
  <title>Ticket Marketplace</title>
  <script src="https://sdk.minepi.com/pi-sdk.js"></script>
</head>

<body style="font-family: Arial; background:#f5f5f5; text-align:center;">

  <h1>🎟️ Ticket Marketplace</h1>

  <h2 id="user">Not logged in</h2>

  <button onclick="login()">Login with Pi</button>

  <br><br>

  <button onclick="goToCreate()">➕ Create Ticket</button>

  <br><br>

  <select onchange="filterCategory(this.value)">
    <option value="all">All</option>
    <option value="Sport">Sport</option>
    <option value="Concert">Concert</option>
    <option value="Other">Other</option>
  </select>

  <hr>

  <div id="marketplace" style="display:flex; flex-wrap:wrap; justify-content:center;"></div>

<script>
let currentUser = null;
let activeFilter = "all";
const feePercent = 0.05;

function loadTickets() {
  const stored = JSON.parse(localStorage.getItem("tickets")) || [];

  const defaultTickets = [
    { title: "Aachen vs Ingolstadt", price: 0.10, desc: "Football match", category: "Sport", seller: "System", image: "" },
    { title: "Concert Berlin", price: 0.20, desc: "Live concert", category: "Concert", seller: "System", image: "" }
  ];

  return [...defaultTickets, ...stored];
}

function renderTickets() {
  let tickets = loadTickets();

  if (activeFilter !== "all") {
    tickets = tickets.filter(t => t.category === activeFilter);
  }

  const container = document.getElementById("marketplace");
  container.innerHTML = "";

  tickets.forEach((ticket, index) => {
    const fee = ticket.price * feePercent;
    const total = ticket.price + fee;

    container.innerHTML += `
      <div style="
        background:white;
        width:250px;
        margin:10px;
        padding:10px;
        border-radius:10px;
        box-shadow:0 2px 5px rgba(0,0,0,0.1);
      ">
        <img src="${ticket.image || 'https://via.placeholder.com/250'}" 
             style="width:100%; height:150px; object-fit:cover; border-radius:8px;">
        
        <h3>${ticket.title}</h3>
        <p>${ticket.category || "General"}</p>
        <p>👤 ${ticket.seller || "Unknown"}</p>
        <p>${ticket.price.toFixed(2)} Pi</p>
        <b>${total.toFixed(2)} Pi</b><br><br>

        <button onclick="openTicket(${index})">View</button>
      </div>
    `;
  });
}

function filterCategory(cat) {
  activeFilter = cat;
  renderTickets();
}

function openTicket(index) {
  const tickets = loadTickets();
  const ticket = tickets[index];
  localStorage.setItem("selectedTicket", JSON.stringify(ticket));
  window.location.href = "ticket.html";
}

function goToCreate() {
  window.location.href = "create.html";
}

async function login() {
  try {
    await Pi.init({ version: "2.0" });

    const auth = await Pi.authenticate(['username', 'payments']);

    currentUser = auth.user;

    const username = currentUser.username || currentUser.uid;

    document.getElementById("user").innerText = "Hello " + username;

    localStorage.setItem("username", username);

  } catch (e) {
    document.getElementById("user").innerText = "Login failed";
  }
}

renderTickets();
</script>

</body>
</html>
