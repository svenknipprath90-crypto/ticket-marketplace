<!DOCTYPE html>
<html>
<head>
  <title>Pi Ticket Marketplace</title>
  <script src="https://sdk.minepi.com/pi-sdk.js"></script>

  <style>
    body {
      font-family: Arial;
      background: linear-gradient(180deg, #020617, #0f172a);
      color: white;
      margin: 0;
    }

    header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 15px;
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(10px);
    }

    header img {
      width: 35px;
      height: 35px;
      border-radius: 8px;
    }

    header span {
      font-size: 20px;
      font-weight: bold;
    }

    .container {
      padding: 15px;
    }

    .top-buttons {
      display: flex;
      gap: 10px;
      margin-top: 10px;
      flex-wrap: wrap;
    }

    button {
      padding: 12px;
      border-radius: 10px;
      border: none;
      font-weight: bold;
      flex: 1;
    }

    .login-btn {
      background: #3b82f6;
      color: white;
    }

    .create-btn {
      background: #6366f1;
      color: white;
    }

    .my-btn {
      background: #f59e0b;
      color: white;
    }

    select {
      margin-top: 15px;
      padding: 12px;
      border-radius: 10px;
      width: 100%;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 15px;
      margin-top: 20px;
    }

    .card {
      background: rgba(255,255,255,0.05);
      border-radius: 16px;
      overflow: hidden;
    }

    .card img {
      width: 100%;
      height: 120px;
      object-fit: cover;
    }

    .card-body {
      padding: 12px;
    }

    .title {
      font-size: 15px;
      font-weight: bold;
    }

    .small {
      font-size: 12px;
      color: #94a3b8;
    }

    .total {
      font-weight: bold;
    }

    .view-btn {
      margin-top: 10px;
      width: 100%;
      background: #22c55e;
      color: white;
      border-radius: 10px;
      padding: 10px;
    }
  </style>
</head>

<body>

<header>
  <img src="0ED2A097-4CDA-417A-A473-BCD55056B90E.png?v=1">
  <span>Pi Ticket Marketplace</span>
</header>

<div class="container">

  <h2 id="user">Not logged in</h2>

  <div class="top-buttons">
    <button class="login-btn" onclick="login()">Login</button>
    <button class="create-btn" onclick="goToCreate()">+ Create</button>
    <button class="my-btn" onclick="goToMy()">My Tickets</button>
  </div>

  <select onchange="filterCategory(this.value)">
    <option value="all">All</option>
    <option value="Sport">Sport</option>
    <option value="Concert">Concert</option>
    <option value="Other">Other</option>
  </select>

  <div id="marketplace" class="grid"></div>

</div>

<script>
let currentUser = null;
let activeFilter = "all";
const feePercent = 0.05;

function loadTickets() {
  const stored = JSON.parse(localStorage.getItem("tickets")) || [];

  const defaultTickets = [
    { title: "Aachen vs Ingolstadt", price: 0.10, category: "Sport", seller: "System", image: "" },
    { title: "Concert Berlin", price: 0.20, category: "Concert", seller: "System", image: "" }
  ];

  return [...defaultTickets, ...stored];
}

function renderTickets() {
  let tickets = loadTickets();

  if (activeFilter !== "all") {
    tickets = tickets.filter(t => t.category === activeFilter);
  }

  const container = document.getElementById("marketplace");
  container.innerHTML = "";

  tickets.forEach((ticket, index) => {
    const fee = ticket.price * feePercent;
    const total = ticket.price + fee;

    const image = ticket.image && ticket.image.trim() !== ""
      ? ticket.image
      : "https://images.unsplash.com/photo-1508098682722-e99c643e7f5c";

    container.innerHTML += `
      <div class="card">
        <img src="${image}">
        <div class="card-body">
          <div class="title">${ticket.title}</div>
          <div class="small">${ticket.category}</div>
          <div class="small">👤 ${ticket.seller}</div>

          <div>${ticket.price.toFixed(2)} Pi</div>
          <div class="total">${total.toFixed(2)} Pi</div>

          <button class="view-btn" onclick="openTicket(${index})">View</button>
        </div>
      </div>
    `;
  });
}

function filterCategory(cat) {
  activeFilter = cat;
  renderTickets();
}

function openTicket(index) {
  const tickets = loadTickets();
  localStorage.setItem("selectedTicket", JSON.stringify(tickets[index]));
  window.location.href = "ticket.html";
}

function goToCreate() {
  window.location.href = "create.html";
}

function goToMy() {
  window.location.href = "my-tickets.html";
}

async function login() {
  try {
    await Pi.init({ version: "2.0" });
    const auth = await Pi.authenticate(['username', 'payments']);

    currentUser = auth.user;
    const username = currentUser.username || currentUser.uid;

    document.getElementById("user").innerText = "Hello " + username;
    localStorage.setItem("username", username);

  } catch (e) {
    document.getElementById("user").innerText = "Login failed";
  }
}

renderTickets();
</script>

</body>
</html>
