<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Pi Ticket Marketplace</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
  margin:0;
  font-family:sans-serif;
  background:#0b1220;
  color:white;
}

.header {
  padding:20px;
  font-size:22px;
  font-weight:bold;
}

.container {
  padding:15px;
}

.button {
  display:inline-block;
  margin-bottom:20px;
  padding:12px 18px;
  background:#2563eb;
  color:white;
  border-radius:10px;
  text-decoration:none;
  font-weight:bold;
}

.card {
  background:#1e293b;
  border-radius:15px;
  overflow:hidden;
  margin-bottom:20px;
  box-shadow:0 5px 15px rgba(0,0,0,0.3);
  cursor:pointer;
}

.card img {
  width:100%;
  height:220px;
  object-fit:cover;
}

.card-content {
  padding:15px;
}

.title {
  font-size:18px;
  font-weight:bold;
}

.price {
  margin-top:10px;
  font-size:18px;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="header">Pi Ticket Marketplace</div>

<div class="container">

<a href="create.html" class="button">➕ Ticket erstellen</a>

<div id="tickets"></div>

</div>

<script>

if (!window.db) {
  window.db = window.supabase.createClient(
    "https://rucejmhjgfvlntoxhczm.supabase.co",
    "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ1Y2VqbWhqZ2Z2bG50b3hoY3ptIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1NTU4OTcsImV4cCI6MjA5MDEzMTg5N30.Eq1vP38qyX0c-m23mceGg-gxZD_mn4sOyGqVxZMRoFk"
  );
}

const db = window.db;

async function loadTickets() {

  const { data } = await db.from("tickets").select("*");

  const container = document.getElementById("tickets");
  container.innerHTML = "";

  data.forEach(ticket => {

    const card = document.createElement("div");
    card.className = "card";

    card.onclick = () => {
      window.location.href = "ticket.html?id=" + ticket.id;
    };

    card.innerHTML = `
      ${ticket.image ? `<img src="${ticket.image}">` : ""}
      <div class="card-content">
        <div class="title">${ticket.title}</div>
        <div class="price">${ticket.price} Pi</div>
      </div>
    `;

    container.appendChild(card);

  });

}

loadTickets();

</script>

</body>
</html>
