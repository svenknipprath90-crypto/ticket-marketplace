<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FORCE CLEANUP</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background: #fff0f0; }
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); max-width: 400px; margin: auto; }
        button { width: 100%; padding: 20px; background: #e63946; color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 18px; }
        #log { margin-top: 20px; text-align: left; font-size: 12px; background: #eee; padding: 10px; border-radius: 5px; min-height: 50px; }
    </style>
</head>
<body>
    <div class="card">
        <h1>🚨 Force Cleanup</h1>
        <p>Klicke diesen Button, um die hängende Zahlung (TXID: 3564c5b...) im Backend zu beenden.</p>
        <button onclick="forceComplete()">JETZT ABSCHLIESSEN</button>
        <div id="log">Warte auf Klick...</div>
    </div>

    <script>
        async function forceComplete() {
            const log = document.getElementById('log');
            const paymentId = "3564c5bd63008467b65ecd538289f5e61d30f32352c9138b47919692a473fb97"; // Deine ID aus dem Screenshot
            
            log.innerText = "Sende Befehl an Backend...";
            
            try {
                const response = await fetch('/.netlify/functions/approve-payment', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ paymentId: paymentId, action: 'complete' })
                });
                const result = await response.json();
                log.innerText = "Antwort vom Server: " + JSON.stringify(result);
                alert("Befehl gesendet! Bitte jetzt 5 Minuten warten und dann im Portal prüfen.");
            } catch (e) {
                log.innerText = "Fehler: " + e.message;
            }
        }
    </script>
</body>
</html>
