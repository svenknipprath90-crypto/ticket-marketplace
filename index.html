<!DOCTYPE html>
<html>
<head>
  <title>Ticket Marketplace</title>
  <script src="https://sdk.minepi.com/pi-sdk.js"></script>
</head>

<body style="font-family: Arial; text-align:center;">

  <h1>🎟️ Ticket Marketplace</h1>

  <h2 id="user">Not logged in</h2>

  <button onclick="login()">Login with Pi</button>

  <br><br>

  <button onclick="goToCreate()">➕ Create Ticket</button>

  <br><br>

  <!-- 🔥 FILTER -->
  <select onchange="filterCategory(this.value)">
    <option value="all">All</option>
    <option value="Sport">Sport</option>
    <option value="Concert">Concert</option>
    <option value="Other">Other</option>
  </select>

  <hr>

  <div id="marketplace"></div>

<script>
let currentUser = null;
let activeFilter = "all";
const feePercent = 0.05;

// Load Tickets
function loadTickets() {
  const stored = JSON.parse(localStorage.getItem("tickets")) || [];

  const defaultTickets = [
    { title: "Aachen vs Ingolstadt", price: 0.10, desc: "Football match", category: "Sport", seller: "System" },
    { title: "Concert Berlin", price: 0.20, desc: "Live concert", category: "Concert", seller: "System" }
  ];

  return [...defaultTickets, ...stored];
}

// Render
function renderTickets() {
  let tickets = loadTickets();

  if (activeFilter !== "all") {
    tickets = tickets.filter(t => t.category === activeFilter);
  }

  const container = document.getElementById("marketplace");
  container.innerHTML = "";

  tickets.forEach((ticket, index) => {
    const fee = ticket.price * feePercent;
    const total = ticket.price + fee;

    container.innerHTML += `
      <div style="border:1px solid #ccc; padding:15px; margin:10px;">
        <h3>${ticket.title}</h3>
        <p>Category: ${ticket.category || "General"}</p>
        <p>Seller: ${ticket.seller || "Unknown"}</p>
        <p>Price: ${ticket.price.toFixed(2)} Pi</p>
        <p><b>Total: ${total.toFixed(2)} Pi</b></p>
        <button onclick="openTicket(${index})">View Details</button>
      </div>
    `;
  });
}

// Filter
function filterCategory(cat) {
  activeFilter = cat;
  renderTickets();
}

// Detail
function openTicket(index) {
  const tickets = loadTickets();
  const ticket = tickets[index];
  localStorage.setItem("selectedTicket", JSON.stringify(ticket));
  window.location.href = "ticket.html";
}

// Create Page
function goToCreate() {
  window.location.href = "create.html";
}

// Login
async function login() {
  try {
    await Pi.init({ version: "2.0" });

    const auth = await Pi.authenticate(['username', 'payments']);

    currentUser = auth.user;

    const username = currentUser.username || currentUser.uid;

    document.getElementById("user").innerText = "Hello " + username;

    localStorage.setItem("username", username);

  } catch (e) {
    document.getElementById("user").innerText = "Login failed";
  }
}

// Init
renderTickets();
</script>

</body>
</html>
