<!DOCTYPE html>
<html>
<head>
  <title>Pi Ticket Marketplace</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
</head>

<body style="background:#0f172a; color:white; font-family:Arial; padding:20px;">

<h2>Pi Ticket Marketplace</h2>

<div id="tickets"></div>

<br><br>

<a href="create.html">
  <button style="
    background:#22c55e;
    color:white;
    border:none;
    padding:12px;
    width:100%;
    border-radius:10px;
    font-size:16px;
  ">
    Create Ticket
  </button>
</a>

<script>

// 🔥 SUPABASE CONNECT (FIXED KEY)
const supabase = window.supabase.createClient(
  "https://rucejmhjgfvlntoxhczm.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ1Y2VqbWhqZ2Z2bG50b3hoY3ptIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1NTU4OTcsImV4cCI6MjA5MDEzMTg5N30.Eq1vP38qyX0c-m23mceGg-gxZD_mn4sOyGqVxZMRoFk"
);

// 📦 LOAD TICKETS
async function loadTickets() {

  const { data, error } = await supabase
    .from("tickets")
    .select("*")
    .order("id", { ascending: false });

  if (error) {
    console.log("ERROR:", error);
    return;
  }

  const container = document.getElementById("tickets");
  container.innerHTML = "";

  if (!data || data.length === 0) {
    container.innerHTML = "<p>No tickets yet</p>";
    return;
  }

  data.forEach(ticket => {

    const div = document.createElement("div");

    div.style.background = "#1e293b";
    div.style.padding = "15px";
    div.style.marginBottom = "15px";
    div.style.borderRadius = "10px";

    div.innerHTML = `
      <h3>${ticket.title}</h3>
      <p>${ticket.category}</p>
      <p>${ticket.description}</p>
      <p><b>${ticket.price} Pi</b></p>
      ${ticket.image_url ? `<img src="${ticket.image_url}" style="width:100%; border-radius:10px; margin-top:10px;">` : ""}
    `;

    container.appendChild(div);
  });
}

// START
loadTickets();

</script>

</body>
</html>
