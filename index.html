<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ticket Marketplace</title>

  <!-- Pi SDK -->
  <script src="https://sdk.minepi.com/pi-sdk.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f7f6;
      text-align: center;
      padding: 20px;
    }

    .card {
      background: white;
      padding: 30px;
      border-radius: 20px;
      max-width: 400px;
      margin: auto;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }

    h1 {
      color: #673ab7;
    }

    #user-info {
      margin-bottom: 20px;
      font-weight: bold;
      color: #673ab7;
    }

    .btn {
      width: 100%;
      padding: 15px;
      background: #673ab7;
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 1.1em;
      cursor: pointer;
    }

    #status {
      margin-top: 20px;
      color: #666;
    }
  </style>
</head>

<body>

<div class="card">
  <h1>🎟️ Ticket Marketplace</h1>

  <div id="user-info">Connecting...</div>

  <button class="btn" onclick="startPayment()">
    Buy Ticket (0.1 Pi)
  </button>

  <div id="status">Waiting for Pi...</div>
</div>

<script>
  const statusEl = document.getElementById("status");
  const userEl = document.getElementById("user-info");

  // 🔐 INIT PI
  async function initPi() {
    try {
      await Pi.init({ version: "2.0" });

      const auth = await Pi.authenticate(["payments"], onIncompletePayment);

      userEl.innerText = "Hello " + auth.user.username;
      statusEl.innerText = "Ready to pay";
    } catch (err) {
      userEl.innerText = "Please open in Pi Browser";
      statusEl.innerText = err.message;
    }
  }

  // 💰 START PAYMENT
  async function startPayment() {
    statusEl.innerText = "Opening wallet...";

    try {
      await Pi.createPayment(
        {
          amount: 0.1,
          memo: "Ticket Purchase",
          metadata: {
            orderId: "TICKET-" + Date.now()
          }
        },
        {
          // 🔥 APPROVE
          onReadyForServerApproval: async (paymentId) => {
            return fetch(
              "https://ticket-marketplace.netlify.app/.netlify/functions/approve-payment",
              {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                  paymentId: paymentId,
                  action: "approve"
                })
              }
            );
          },

          // 🔥 COMPLETE
          onReadyForServerCompletion: async (paymentId, txid) => {
            return fetch(
              "https://ticket-marketplace.netlify.app/.netlify/functions/approve-payment",
              {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                  paymentId: paymentId,
                  action: "complete",
                  txid: txid
                })
              }
            );
          },

          // ❌ CANCEL
          onCancel: () => {
            statusEl.innerText = "Payment cancelled";
          },

          // ❌ ERROR
          onError: (error) => {
            statusEl.innerText = "Error: " + error.message;
          }
        }
      );
    } catch (err) {
      statusEl.innerText = "Error: " + err.message;
    }
  }

  // 🔁 INCOMPLETE HANDLER
  function onIncompletePayment(payment) {
    return fetch(
      "https://ticket-marketplace.netlify.app/.netlify/functions/approve-payment",
      {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          paymentId: payment.identifier,
          action: "complete"
        })
      }
    );
  }

  // START
  initPi();
</script>

</body>
</html>
