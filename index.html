<!DOCTYPE html>
<html>
<head>
  <title>Ticket Marketplace</title>
  <script src="https://sdk.minepi.com/pi-sdk.js"></script>
</head>

<body style="text-align:center; font-family:sans-serif; padding:40px;">

  <h1>🎟️ Ticket Marketplace</h1>

  <h2 id="user">Loading...</h2>

  <button onclick="pay()" style="padding:15px 30px; font-size:18px;">
    Buy Ticket (0.1 Pi)
  </button>

  <p id="status"></p>

<script>
  let currentUser = null;

  async function start() {
    try {
      if (!window.Pi) {
        alert("❌ Not running inside Pi Browser");
        return;
      }

      Pi.init({ version: "2.0" });

      const scopes = ['payments'];

      // 🔥 FIX IST HIER
      const auth = await Pi.authenticate(scopes, onIncompletePayment);

      currentUser = auth.user;

      document.getElementById("user").innerText =
        "Hello " + currentUser.username;

    } catch (e) {
      document.getElementById("user").innerText = "Login failed";
      console.error("AUTH ERROR:", e);
    }
  }

  async function pay() {
    if (!currentUser) {
      alert("Not logged in");
      return;
    }

    try {
      await Pi.createPayment({
        amount: 0.1,
        memo: "Ticket purchase",
        metadata: { type: "ticket" }
      }, {
        onReadyForServerApproval: function(paymentId) {
          fetch("/.netlify/functions/approve-payment", {
            method: "POST",
            body: JSON.stringify({ paymentId })
          });
        },

        onReadyForServerCompletion: function(paymentId, txid) {
          fetch("/.netlify/functions/approve-payment", {
            method: "POST",
            body: JSON.stringify({ paymentId, txid, action: "complete" })
          });
        },

        onCancel: function() {
          document.getElementById("status").innerText = "Payment cancelled";
        },

        onError: function(error) {
          document.getElementById("status").innerText = "Error: " + error;
        }
      });

    } catch (err) {
      console.error("PAYMENT ERROR:", err);
    }
  }

  // 🔥 DAS HIER FEHLTE VORHER
  function onIncompletePayment(payment) {
    return fetch("/.netlify/functions/approve-payment", {
      method: "POST",
      body: JSON.stringify({
        paymentId: payment.identifier,
        action: "complete"
      })
    });
  }

  start();
</script>

</body>
</html>
