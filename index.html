<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ticket Marketplace</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background: #f0f2f5; color: #333; }
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 350px; margin: auto; }
        .btn { width: 100%; padding: 15px; background: #673ab7; color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 1.1em; margin-top: 20px; }
        #status { margin-top: 20px; font-weight: bold; color: #673ab7; }
        #user-info { font-size: 1.1em; font-weight: bold; color: #333; margin-bottom: 15px; padding: 10px; background: #e1d5f2; border-radius: 10px; min-height: 20px; }
    </style>
</head>
<body>
    <div class="card">
        <h1>🎟️ Ticket Shop</h1>
        <div id="user-info">Anmeldung läuft...</div>
        <div id="status">Warte auf Pi Network...</div>
        <button class="btn" onclick="startPayment()">JETZT BEZAHLEN (0.1 Pi)</button>
    </div>

    <script>
        const statusEl = document.getElementById('status');
        const userEl = document.getElementById('user-info');

        window.onload = async function() {
            try {
                await Pi.init({ version: "1.5.0" });
                const auth = await Pi.authenticate(['payments'], onIncompletePaymentFound);
                userEl.innerText = "Willkommen, " + auth.user.username;
                statusEl.innerText = "Bereit für Schritt 10";
            } catch (err) {
                statusEl.innerText = "Fehler: " + err.message;
            }
        };

        async function startPayment() {
            statusEl.innerText = "Wallet wird geöffnet...";
            try {
                const payment = await Pi.createPayment({
                    amount: 0.1,
                    memo: "Testzahlung Ticket Shop",
                    metadata: { type: "test_step_10" }
                }, {
                    onReadyForServerApproval: (id) => {
                        return fetch('/.netlify/functions/approve-payment', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ paymentId: id, action: 'approve' })
                        });
                    },
                    onReadyForServerCompletion: (id, txid) => {
                        statusEl.innerText = "✅ Zahlung erfolgreich!";
                        return fetch('/.netlify/functions/approve-payment', {
                            method: 'POST',
                            headers: { 'Content-Type': 'variations/json' },
                            body: JSON.stringify({ paymentId: id, action: 'complete', txid: txid })
                        });
                    },
                    onCancel: () => { statusEl.innerText = "Abgebrochen"; },
                    onError: (e) => { statusEl.innerText = "Fehler: " + e.message; }
                });
            } catch (err) {
                statusEl.innerText = "Fehler: " + err.message;
            }
        }

        function onIncompletePaymentFound(payment) {
            return fetch('/.netlify/functions/approve-payment', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ paymentId: payment.identifier, action: 'complete' })
            });
        }
    </script>
</body>
</html>
