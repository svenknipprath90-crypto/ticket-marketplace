<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pi Step 10 Cleanup</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background: #f4f4f6; color: #333; }
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); max-width: 400px; margin: 40px auto; }
        h1 { color: #6f2dbd; font-size: 22px; }
        button { width: 100%; padding: 16px; margin: 12px 0; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 16px; }
        .btn-auth { background: #6f2dbd; color: white; }
        .btn-pay { background: #f0ad3d; color: white; }
        #status { margin-bottom: 15px; font-weight: bold; min-height: 24px; }
    </style>
</head>
<body>

    <div class="card">
        <h1>Pi Checklist Final</h1>
        <div id="status">Warte auf Login...</div>
        
        <button class="btn-auth" onclick="login()">1. Login & Cleanup</button>
        <hr style="border: 0; border-top: 1px solid #eee; margin: 20px 0;">
        <button class="btn-pay" onclick="createPayment()">2. Pay 0.1 Pi</button>
    </div>

    <script>
        const Pi = window.Pi;
        Pi.init({ version: "2.0", sandbox: true });

        async function login() {
            const statusDiv = document.getElementById('status');
            try {
                const auth = await Pi.authenticate(['username', 'payments'], async (payment) => {
                    // WICHTIG: Falls noch eine Zahlung offen ist, wird sie hier automatisch beendet
                    console.log("Hängende Zahlung gefunden:", payment.identifier);
                    await fetch('/.netlify/functions/approve-payment', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ paymentId: payment.identifier, action: 'complete' })
                    });
                    statusDiv.innerText = "Alte Zahlung wurde bereinigt!";
                });
                statusDiv.innerHTML = "✅ Login OK: " + auth.user.username;
            } catch (e) { alert("Login fehlgeschlagen."); }
        }

        async function createPayment() {
            try {
                await Pi.createPayment({
                    amount: 0.1,
                    memo: "Checklist Step 10 Verification",
                    metadata: { id: "payment-" + Date.now() }
                }, {
                    onReadyForServerApproval: async (paymentId) => {
                        await fetch('/.netlify/functions/approve-payment', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ paymentId, action: 'approve' })
                        });
                    },
                    onReadyForServerCompletion: async (paymentId, txid) => {
                        // Nach der Blockchain-Transaktion schließen wir die Zahlung ab
                        await fetch('/.netlify/functions/approve-payment', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ paymentId, action: 'complete' })
                        });
                        alert("Erfolg! TXID: " + txid);
                        document.getElementById('status').innerText = "✅ Zahlung abgeschlossen!";
                    },
                    onCancel: (id) => {},
                    onError: (err) => { alert("Info: " + err.message); }
                });
            } catch (e) { alert("Fehler beim Start."); }
        }
    </script>
</body>
</html>
