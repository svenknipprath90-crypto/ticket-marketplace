<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Favoriten</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://sdk.minepi.com/pi-sdk.js"></script>

<style>
body {
  margin:0;
  font-family:sans-serif;
  background:#0b1220;
  color:white;
}

.container {
  padding:20px;
}

.card {
  background:#1e293b;
  border-radius:15px;
  margin-bottom:20px;
  padding:15px;
}

.button {
  display:block;
  margin-top:20px;
  padding:12px;
  background:#374151;
  text-align:center;
  border-radius:10px;
  text-decoration:none;
  color:white;
}
</style>
</head>

<body>

<div class="container">
  <h1>❤️ Favoriten</h1>
  <div id="list">Lade...</div>

  <a href="index.html" class="button">⬅ Zurück</a>
</div>

<script>

// SUPABASE
const db = window.supabase.createClient(
  "https://rucejmhjgfvlntoxhczm.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ1Y2VqbWhqZ2Z2bG50b3hoY3ptIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1NTU4OTcsImV4cCI6MjA5MDEzMTg5N30.Eq1vP38qyX0c-m23mceGg-gxZD_mn4sOyGqVxZMRoFk"
);

let currentUser = null;

// INIT
async function init() {

  try {
    await Pi.init({ version: "2.0" });

    const auth = await Pi.authenticate(['username'], () => {});
    currentUser = auth.user;

    loadFavorites();

  } catch (e) {
    document.getElementById("list").innerText = "Bitte im Pi Browser öffnen";
  }

}

// FAVORITEN LADEN
async function loadFavorites() {

  const { data: favs } = await db
    .from("favorites")
    .select("*")
    .eq("user_id", currentUser.username);

  const ids = favs.map(f => f.ticket_id);

  if (ids.length === 0) {
    document.getElementById("list").innerText = "Keine Favoriten";
    return;
  }

  const { data: tickets } = await db
    .from("tickets")
    .select("*")
    .in("id", ids);

  render(tickets);
}

// RENDER
function render(tickets) {

  const el = document.getElementById("list");
  el.innerHTML = "";

  tickets.forEach(t => {
    el.innerHTML += `
      <div class="card">
        <h3>${t.title}</h3>
        <p>${t.category}</p>
        <p>${t.description}</p>
        <strong>${t.price} Pi</strong>
      </div>
    `;
  });

}

init();

</script>

</body>
</html>
