<!DOCTYPE html>
<html>
<head>
  <title>Ticket Marketplace</title>
  <script src="https://sdk.minepi.com/pi-sdk.js"></script>
</head>

<body style="font-family: Arial; text-align:center;">

  <h1>🎟️ Ticket Marketplace</h1>

  <h2 id="user">Not logged in</h2>

  <button onclick="login()">Login with Pi</button>

  <hr>

  <!-- Marketplace -->
  <div id="marketplace"></div>

  <p id="status"></p>

<script>
let currentUser = null;

// 🔹 Fake Tickets (später echte Daten)
const tickets = [
  { title: "Aachen vs Ingolstadt", price: 0.1 },
  { title: "Concert Berlin", price: 0.2 }
];

// 🔹 Fee Settings
const feePercent = 0.05;

// 🔹 Marketplace rendern
function renderTickets() {
  const container = document.getElementById("marketplace");
  container.innerHTML = "";

  tickets.forEach((ticket, index) => {
    const fee = ticket.price * feePercent;
    const total = ticket.price + fee;

    container.innerHTML += `
      <div style="border:1px solid #ccc; padding:15px; margin:10px;">
        <h3>${ticket.title}</h3>
        <p>Price: ${ticket.price.toFixed(2)} Pi</p>
        <p>Fee: ${fee.toFixed(2)} Pi</p>
        <p><b>Total: ${total.toFixed(2)} Pi</b></p>
        <button onclick="buy(${index})">Buy Ticket</button>
      </div>
    `;
  });
}

// 🔹 Login
async function login() {
  try {
    await Pi.init({ version: "2.0" });

    const auth = await Pi.authenticate(['username', 'payments']);
    currentUser = auth.user;

    document.getElementById("user").innerText =
      "Hello " + (currentUser.username || currentUser.uid);

  } catch (e) {
    document.getElementById("status").innerText = "Login failed";
  }
}

// 🔹 Payment (DEIN CORE – nur Fee ergänzt)
async function buy(index) {
  if (!currentUser) {
    document.getElementById("status").innerText = "Login first";
    return;
  }

  const ticket = tickets[index];
  const fee = ticket.price * feePercent;
  const total = ticket.price + fee;

  try {
    const paymentData = {
      amount: total,
      memo: ticket.title,
      metadata: { type: "ticket" }
    };

    const callbacks = {
      onReadyForServerApproval: async (paymentId) => {
        await fetch("/.netlify/functions/approve-payment", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ paymentId })
        });
      },

      onReadyForServerCompletion: async (paymentId, txid) => {
        await fetch("/.netlify/functions/complete-payment", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ paymentId, txid })
        });
      },

      onCancel: () => {
        document.getElementById("status").innerText = "Cancelled";
      },

      onError: (error) => {
        document.getElementById("status").innerText = "Error: " + error;
      }
    };

    await Pi.createPayment(paymentData, callbacks);

  } catch (err) {
    document.getElementById("status").innerText = "Payment failed";
  }
}

// Start
renderTickets();
</script>

</body>
</html>
