<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ticket Marketplace</title>

    <script src="https://sdk.minepi.com/pi-sdk.js"></script>

    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background: #f4f7f6; }
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 350px; margin: auto; }
        #user-info { font-weight: bold; margin-bottom: 20px; color: #673ab7; font-size: 1.2em; min-height: 1.5em; }
        .btn { width: 100%; padding: 15px; background: #673ab7; color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 1.1em; }
        #status { margin-top: 20px; font-size: 0.9em; color: #666; }
    </style>
</head>

<body>
    <div class="card">
        <h1>🎟️ Ticket Marketplace</h1>

        <div id="user-info">Login...</div>

        <button class="btn" onclick="startPayment()">BUY TICKET (0.1 Pi)</button>

        <div id="status">Waiting for Pi...</div>
    </div>

    <script>
        const statusEl = document.getElementById('status');
        const userEl = document.getElementById('user-info');

        async function initPi() {
            try {
                await Pi.init({ version: "1.5.0" });

                const auth = await Pi.authenticate(['payments'], onIncompletePayment);

                // 🔥 NUR DIESER FIX IST NEU
                const username =
                    auth.user.username ||
                    auth.user.uid ||
                    "Pi User";

                userEl.innerText = "Hello " + username;
                statusEl.innerText = "Ready";

            } catch (err) {
                userEl.innerText = "Open in Pi Browser";
                statusEl.innerText = "Login required";
            }
        }

        async function startPayment() {
            statusEl.innerText = "Opening wallet...";

            try {
                await Pi.createPayment({
                    amount: 0.1,
                    memo: "Ticket Purchase",
                    metadata: { orderId: Date.now() }
                }, {
                    onReadyForServerApproval: (id) => {
                        return fetch('/.netlify/functions/approve-payment', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ paymentId: id, action: 'approve' })
                        });
                    },

                    onReadyForServerCompletion: (id, txid) => {
                        statusEl.innerText = "Payment successful";
                        return fetch('/.netlify/functions/approve-payment', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ paymentId: id, action: 'complete', txid })
                        });
                    },

                    onCancel: () => { statusEl.innerText = "Cancelled"; },
                    onError: (e) => { statusEl.innerText = "Error: " + e.message; }
                });

            } catch (err) {
                statusEl.innerText = "Error: " + err.message;
            }
        }

        function onIncompletePayment(payment) {
            return fetch('/.netlify/functions/approve-payment', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    paymentId: payment.identifier,
                    action: 'complete'
                })
            });
        }

        initPi();
    </script>
</body>
</html>
