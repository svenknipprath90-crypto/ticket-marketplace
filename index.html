<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ticket Marketplace</title>

    <script src="https://sdk.minepi.com/pi-sdk.js"></script>

    <style>
        body {
            font-family: sans-serif;
            text-align: center;
            padding: 20px;
            background: #f4f7f6;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-width: 350px;
            margin: auto;
        }

        h1 {
            color: #673ab7;
        }

        #user-info {
            margin-bottom: 20px;
            font-weight: bold;
        }

        .btn {
            width: 100%;
            padding: 15px;
            margin-top: 10px;
            background: #673ab7;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            cursor: pointer;
        }

        #status {
            margin-top: 15px;
            color: #666;
        }
    </style>
</head>

<body>

<div class="card">
    <h1>🎟️ Ticket Marketplace</h1>

    <div id="user-info">Not logged in</div>

    <button class="btn" onclick="login()">Login with Pi</button>

    <button class="btn" onclick="pay()" id="payBtn" disabled>
        Buy Ticket (0.1 Pi)
    </button>

    <div id="status">Waiting...</div>
</div>

<script>
let isLoggedIn = false;

async function login() {
    try {
        await Pi.init({ version: "1.5.0" });

        const auth = await Pi.authenticate(['payments'], onIncompletePayment);

        const username =
            auth.user.username ||
            auth.user.uid ||
            "Pi User";

        document.getElementById("user-info").innerText = "Hello " + username;

        document.getElementById("status").innerText = "Logged in";

        isLoggedIn = true;
        document.getElementById("payBtn").disabled = false;

    } catch (err) {
        console.error(err);
        document.getElementById("status").innerText = "Login failed";
    }
}

async function pay() {
    if (!isLoggedIn) {
        document.getElementById("status").innerText = "Please login first";
        return;
    }

    try {
        await Pi.createPayment({
            amount: 0.1,
            memo: "Ticket Purchase",
            metadata: { orderId: Date.now() }
        }, {
            onReadyForServerApproval: (paymentId) => {
                return fetch('/.netlify/functions/approve-payment', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        paymentId,
                        action: 'approve'
                    })
                });
            },

            onReadyForServerCompletion: (paymentId, txid) => {
                document.getElementById("status").innerText = "Payment success";

                return fetch('/.netlify/functions/approve-payment', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        paymentId,
                        action: 'complete',
                        txid
                    })
                });
            },

            onCancel: () => {
                document.getElementById("status").innerText = "Cancelled";
            },

            onError: (err) => {
                document.getElementById("status").innerText = err.message;
            }
        });

    } catch (err) {
        document.getElementById("status").innerText = err.message;
    }
}

function onIncompletePayment(payment) {
    return fetch('/.netlify/functions/approve-payment', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            paymentId: payment.identifier,
            action: 'complete'
        })
    });
}
</script>

</body>
</html>
