<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ticket Marketplace</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        body { font-family: 'Arial', sans-serif; text-align: center; padding: 20px; background: #f0f2f5; }
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 350px; margin: auto; }
        #user-info { font-weight: bold; margin-bottom: 20px; color: #333; font-size: 1.2em; min-height: 1.5em; }
        .btn { width: 100%; padding: 15px; background: #673ab7; color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; }
        #status { margin-top: 20px; font-size: 0.9em; color: #666; }
    </style>
</head>
<body>
    <div class="card">
        <h1>🎟️ Ticket Shop</h1>
        <div id="user-info">Lade Profil...</div>
        
        <button class="btn" onclick="startPayment()">JETZT BEZAHLEN (0.1 Pi)</button>
        
        <div id="status">Warte auf Pi Network...</div>
    </div>

    <script>
        const statusEl = document.getElementById('status');
        const userEl = document.getElementById('user-info');

        // 1. Initialisierung sofort beim Start (Version 1.5.0 ist Pflicht)
        async function initPi() {
            try {
                await Pi.init({ version: "1.5.0" });
                console.log("Pi SDK initialisiert");
                login(); // Wenn Init klappt, sofort Login
            } catch (err) {
                console.error("Init Fehler:", err);
                statusEl.innerText = "Fehler: " + err.message;
                // Selbst wenn Init meckert, versuchen wir den Login trotzdem!
                login();
            }
        }

        // 2. Der Login-Prozess (für den Usernamen)
        async function login() {
            try {
                const scopes = ['payments'];
                const auth = await Pi.authenticate(scopes, onIncompletePaymentFound);
                userEl.innerText = "Hallo, " + auth.user.username;
                statusEl.innerText = "Bereit für die Zahlung";
            } catch (err) {
                console.error("Login Fehler:", err);
                userEl.innerText = "Bitte im Pi Browser öffnen";
            }
        }

        // 3. Die Zahlung
        async function startPayment() {
            statusEl.innerText = "Zahlung wird vorbereitet...";
            try {
                const payment = await Pi.createPayment({
                    amount: 0.1,
                    memo: "Ticket Kauf",
                    metadata: { type: "ticket_purchase" }
                }, {
                    onReadyForServerApproval: (id) => {
                        return fetch('/api/approve-payment', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ paymentId: id, action: 'approve' })
                        });
                    },
                    onReadyForServerCompletion: (id, txid) => {
                        statusEl.innerText = "✅ Zahlung erfolgreich!";
                        return fetch('/api/approve-payment', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ paymentId: id, action: 'complete', txid: txid })
                        });
                    },
                    onCancel: () => { statusEl.innerText = "Abgebrochen"; },
                    onError: (e) => { statusEl.innerText = "Fehler: " + e.message; }
                });
            } catch (err) {
                statusEl.innerText = "Fehler: " + err.message;
            }
        }

        function onIncompletePaymentFound(payment) {
            return fetch('/api/approve-payment', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ paymentId: payment.identifier, action: 'complete' })
            });
        }

        // Script starten
        initPi();
    </script>
</body>
</html>
