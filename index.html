<!DOCTYPE html>
<html>
<head>
  <title>Pi Ticket Marketplace</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
</head>

<body style="margin:0; font-family: Arial; background:#0f172a; color:white;">

<!-- HEADER -->
<header style="
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px;
  background:#111827;
">

  <div style="display:flex; align-items:center; gap:10px;">
    <img src="0ED2A097-4CDA-417A-A473-BCD55056B90E.png" style="width:35px;">
    <h2 style="margin:0;">Pi Ticket Marketplace</h2>
  </div>

  <button onclick="goCreate()" style="
    background:#6366f1;
    color:white;
    border:none;
    padding:10px 15px;
    border-radius:8px;
  ">
    + Create
  </button>

</header>

<!-- CONTENT -->
<div style="padding:15px;">
  <h3>All Tickets</h3>

  <div id="marketplace" style="
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:15px;
  "></div>
</div>

<script>

// 🔥 SUPABASE
const supabase = window.supabase.createClient(
  "https://rucejmhjgfvlntoxhczm.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ1Y2VqbWhqZ2Z2bG50b3hoY3ptIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1NTU4OTcsImV4cCI6MjA5MDEzMTg5N30.Eq1vP38qyX0c-m23mceGg-gxZD_mn4sOyGqVxZMRoFk"
);

// NAVIGATION
function goCreate() {
  window.location.href = "create.html";
}

// LOAD
async function loadTickets() {
  const { data, error } = await supabase
    .from("tickets")
    .select("*");

  if (error) {
    console.log(error);
    return [];
  }

  return data;
}

// RENDER
async function renderTickets() {
  const tickets = await loadTickets();

  const container = document.getElementById("marketplace");
  container.innerHTML = "";

  if (tickets.length === 0) {
    container.innerHTML = "<p>No tickets yet</p>";
    return;
  }

  tickets.forEach((t) => {

    container.innerHTML += `
      <div style="
        background:#1f2937;
        border-radius:12px;
        overflow:hidden;
      ">

        <!-- IMAGE PLACEHOLDER -->
        <div style="
          height:120px;
          background:#374151;
          display:flex;
          align-items:center;
          justify-content:center;
        ">
          <span>🎟️</span>
        </div>

        <!-- CONTENT -->
        <div style="padding:10px;">

          <h4 style="margin:5px 0;">${t.title}</h4>

          <p style="margin:0; color:#9ca3af;">
            ${t.category}
          </p>

          <p style="margin:5px 0;">
            👤 ${t.seller || "user"}
          </p>

          <p style="margin:5px 0; font-weight:bold;">
            ${t.price} Pi
          </p>

          <button style="
            width:100%;
            margin-top:10px;
            padding:8px;
            background:#22c55e;
            border:none;
            border-radius:8px;
            color:white;
          ">
            View
          </button>

        </div>

      </div>
    `;
  });
}

// START
renderTickets();

</script>

</body>
</html>
