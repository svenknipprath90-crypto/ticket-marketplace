<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ticket Shop</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background: #f0f2f5; }
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 350px; margin: auto; }
        .btn { width: 100%; padding: 15px; background: #673ab7; color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; }
        #status { margin-top: 20px; font-weight: bold; color: #673ab7; }
    </style>
</head>
<body>
    <div class="card">
        <h1>🎟️ Ticket Shop</h1>
        <p>Version 5.0 - Finaler Versuch</p>
        <button class="btn" onclick="pay()">JETZT BEZAHLEN</button>
        <div id="status">Bereit</div>
    </div>

    <script>
        const statusEl = document.getElementById('status');

        // Nur eine einzige, simple Initialisierung
        try {
            Pi.init({ version: "1" });
            statusEl.innerText = "✅ System bereit";
        } catch (e) {
            statusEl.innerText = "Lade...";
        }

        async function pay() {
            statusEl.innerText = "Zahlung startet...";
            try {
                // Login und Zahlung in einem Rutsch
                await Pi.authenticate(['payments'], onIncompletePayment);
                
                Pi.createPayment({
                    amount: 0.1,
                    memo: "Ticket",
                    metadata: { type: "test" }
                }, {
                    onReadyForServerApproval: (id) => {
                        statusEl.innerText = "Warte auf Server...";
                        fetch('/api/approve-payment', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ paymentId: id, action: 'approve' })
                        });
                    },
                    onReadyForServerCompletion: (id, txid) => {
                        statusEl.innerText = "✅ ERFOLG!";
                        fetch('/api/approve-payment', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ paymentId: id, action: 'complete', txid: txid })
                        });
                        alert("Ticket gekauft!");
                    },
                    onCancel: () => { statusEl.innerText = "Abgebrochen"; },
                    onError: (e) => { statusEl.innerText = "Fehler: " + e.message; }
                });
            } catch (err) {
                statusEl.innerText = "Fehler: " + err.message;
            }
        }

        function onIncompletePayment(payment) {
            fetch('/api/approve-payment', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ paymentId: payment.identifier, action: 'complete' })
            });
        }
    </script>
</body>
</html>
