<!DOCTYPE html>
<html>
<head>
  <title>Pi Ticket Marketplace</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
</head>

<body style="font-family: Arial; background:#0f172a; color:white; text-align:center;">

<!-- HEADER -->
<header style="display:flex; align-items:center; justify-content:center; gap:10px; padding:15px; background:rgba(255,255,255,0.05);">
  <img src="0ED2A097-4CDA-417A-A473-BCD55056B90E.png" style="width:40px;">
  <h2>Pi Ticket Marketplace</h2>
</header>

<h3>All Tickets</h3>

<div id="marketplace"></div>

<script>

const supabase = window.supabase.createClient(
  "https://rucejmhjgfvlntoxhczm.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ1Y2VqbWhqZ2Z2bG50b3hoY3ptIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1NTU4OTcsImV4cCI6MjA5MDEzMTg5N30.Eq1vP38qyX0c-m23mceGg-gxZD_mn4sOyGqVxZMRoFk"
);

// Tickets laden
async function loadTickets() {
  const { data, error } = await supabase
    .from("tickets")
    .select("*");

  if (error) {
    console.log(error);
    return [];
  }

  return data;
}

// Anzeigen
async function renderTickets() {
  const tickets = await loadTickets();

  const container = document.getElementById("marketplace");
  container.innerHTML = "";

  tickets.forEach((t) => {
    container.innerHTML += `
      <div style="background:#1e293b; margin:15px; padding:15px; border-radius:12px;">
        <h3>${t.title}</h3>
        <p>${t.category} → ${t.subcategory}</p>
        <p><b>${t.price} Pi</b></p>
        <p>${t.description}</p>
      </div>
    `;
  });
}

// Start
renderTickets();

</script>

</body>
</html>
