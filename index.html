<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ticket Marketplace Pi</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; text-align: center; padding: 20px; background-color: #f0f2f5; color: #1c1e21; }
        .container { background: white; padding: 40px; border-radius: 28px; box-shadow: 0 12px 40px rgba(0,0,0,0.1); max-width: 400px; margin: 40px auto; border: 1px solid #ddd; }
        h1 { color: #673ab7; font-size: 24px; margin-bottom: 20px; }
        .btn-pay { width: 100%; padding: 18px; background: #673ab7; color: white; border: none; border-radius: 16px; font-weight: bold; cursor: pointer; font-size: 1.2em; }
        #status-text { margin-top: 20px; font-size: 1.1em; font-weight: bold; color: #673ab7; }
        #debug-text { margin-top: 10px; font-size: 12px; color: #d32f2f; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎟️ Ticket Marketplace</h1>
        <p>Version: 3.0 (Universal Fix)</p>
        <button class="btn-pay" onclick="pay()">Ticket kaufen (0.1 Pi)</button>
        <div id="status-text">Status: Kontaktiere Pi Network...</div>
        <div id="debug-text"></div>
    </div>

    <script>
        const statusEl = document.getElementById('status-text');
        const debugEl = document.getElementById('debug-text');

        async function startApp() {
            try {
                if (typeof Pi === 'undefined') {
                    statusEl.innerText = "SDK wird gesucht...";
                    return;
                }

                // Dieser String "1.5.0" ist die stabilste Version für den Browser
                await Pi.init({ version: "1.5.0", sandbox: false });
                statusEl.innerText = "✅ SDK verbunden!";
                
                Pi.authenticate(['payments'], onIncompletePaymentFound)
                  .catch((e) => { debugEl.innerText = "Login: " + e.message; });
            } catch (e) {
                // Wenn 1.5.0 fehlschlägt, versuchen wir als Backup die einfache "5"
                try {
                    await Pi.init({ version: "5", sandbox: false });
                    statusEl.innerText = "✅ SDK verbunden (Alt-Modus)!";
                } catch (e2) {
                    debugEl.innerText = "Init-Fehler: " + e2.message;
                }
            }
        }

        async function onIncompletePaymentFound(payment) {
            await fetch('/api/approve-payment', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ paymentId: payment.identifier, action: 'complete' })
            });
        }

        function pay() {
            statusEl.innerText = "Zahlung wird aufgerufen...";
            const paymentData = { amount: 0.1, memo: "Test Ticket", metadata: { type: "test" } };
            const callbacks = {
                onReadyForServerApproval: (id) => {
                    fetch('/api/approve-payment', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ paymentId: id, action: 'approve' })
                    });
                },
                onReadyForServerCompletion: (id, txid) => {
                    fetch('/api/approve-payment', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ paymentId: id, action: 'complete', txid: txid })
                    });
                    alert("Zahlung erfolgreich!");
                },
                onCancel: () => { statusEl.innerText = "Abgebrochen"; },
                onError: (error) => { debugEl.innerText = "Fehler: " + error.message; }
            };
            Pi.createPayment(paymentData, callbacks);
        }

        // Wir rufen es sofort auf, sobald das Script bereit ist
        startApp();
    </script>
</body>
</html>
