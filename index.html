<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Pi Ticket Marketplace</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
  margin:0;
  font-family:sans-serif;
  background:#0b1220;
  color:white;
}

.header {
  padding:20px;
  font-size:22px;
  font-weight:bold;
}

.container {
  padding:15px;
}

.button {
  display:inline-block;
  margin-bottom:20px;
  padding:12px 18px;
  background:#2563eb;
  color:white;
  border-radius:10px;
  text-decoration:none;
  font-weight:bold;
}

.card {
  background:#1e293b;
  border-radius:15px;
  overflow:hidden;
  margin-bottom:20px;
  box-shadow:0 5px 15px rgba(0,0,0,0.3);
  position:relative;
  cursor:pointer;
}

.card img {
  width:100%;
  height:220px;
  object-fit:cover;
}

.heart {
  position:absolute;
  top:10px;
  right:10px;
  font-size:24px;
  cursor:pointer;
}

.card-content {
  padding:15px;
}

.title {
  font-size:18px;
  font-weight:bold;
}

.price {
  margin-top:10px;
  font-size:18px;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="header">Pi Ticket Marketplace</div>

<div class="container">

<a href="create.html" class="button">➕ Ticket erstellen</a>
<a href="favorites.html" class="button">❤️ Favoriten</a>

<div id="tickets"></div>

</div>

<script>

if (!window.db) {
  window.db = window.supabase.createClient(
    "https://rucejmhjgfvlntoxhczm.supabase.co",
    "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
  );
}

const db = window.db;

function getFavorites() {
  return JSON.parse(localStorage.getItem("favorites") || "[]");
}

function toggleFavorite(id) {
  let favs = getFavorites();

  if (favs.includes(id)) {
    favs = favs.filter(f => f !== id);
  } else {
    favs.push(id);
  }

  localStorage.setItem("favorites", JSON.stringify(favs));
  loadTickets();
}

async function loadTickets() {

  const { data } = await db.from("tickets").select("*");

  const container = document.getElementById("tickets");
  container.innerHTML = "";

  const favs = getFavorites();

  data.forEach(ticket => {

    const card = document.createElement("div");
    card.className = "card";

    card.onclick = () => {
      window.location.href = "ticket.html?id=" + ticket.id;
    };

    const liked = favs.includes(ticket.id);

    card.innerHTML = `
      <div class="heart" onclick="event.stopPropagation(); toggleFavorite(${ticket.id})">
        ${liked ? "❤️" : "🤍"}
      </div>

      ${ticket.image ? `<img src="${ticket.image}">` : ""}

      <div class="card-content">
        <div class="title">${ticket.title}</div>
        <div class="price">${ticket.price} Pi</div>
      </div>
    `;

    container.appendChild(card);

  });

}

loadTickets();

</script>

</body>
</html>
