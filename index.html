<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Pi Ticket Marketplace</title>

<!-- External Scripts -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://sdk.minepi.com/pi-sdk.js"></script>

<!-- CSS & i18n -->
<link rel="stylesheet" href="style.css">
<script src="i18n.js"></script>

<style>
/* Page specific styles */
.filter-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 20px;
  background: var(--glass-bg);
  padding: 15px;
  border-radius: 15px;
  border: 1px solid var(--glass-border);
}

.category-select {
  padding: 10px;
  background: rgba(0,0,0,0.3);
  border: 1px solid var(--glass-border);
  border-radius: 10px;
  color: white;
  font-size: 16px;
  width: auto;
}
</style>
</head>

<body>
<div class="container">

  <!-- HEADER -->
  <div class="header glass-panel">
    <div class="header-logo-container">
      <img src="0ED2A097-4CDA-417A-A473-BCD55056B90E.png" alt="Logo" class="header-logo">
      <div>
        <h1 class="header-title" data-i18n="title">🎟️ Pi Ticket Marketplace</h1>
        <div id="user" style="color: #60a5fa; font-weight: 600; margin-top: 5px;"></div>
      </div>
    </div>
    
    <div class="lang-toggle">
      <button class="lang-btn" id="lang-de" onclick="setLanguage('de')">🇩🇪</button>
      <button class="lang-btn" id="lang-en" onclick="setLanguage('en')">🇬🇧</button>
    </div>
  </div>

  <div style="margin-bottom: 25px; display: flex; gap: 10px; flex-wrap: wrap;">
    <button id="loginBtn" class="btn btn-success" data-i18n="login">🔐 Login mit Pi</button>
    <button id="logoutBtn" class="btn btn-danger" style="display:none;" data-i18n="logout">🚪 Logout</button>
    <a href="create2.html" class="btn btn-primary" data-i18n="createTicketBtn">➕ Ticket erstellen</a>
    <a href="favorites.html?v=3" class="btn btn-glass" data-i18n="favorites">❤️ Favoriten</a>
    <a href="purchases.html?v=3" class="btn btn-glass" id="myPurchasesBtn" style="display:none; position:relative;" data-i18n="myPurchases">
      💰 Meine Käufe
      <span id="purchasesDot" style="display:none; position:absolute; top:-5px; right:-5px; width:12px; height:12px; background:red; border-radius:50%; box-shadow:0 0 5px red;"></span>
    </a>
    <a href="my-sales.html?v=3" class="btn btn-glass" id="mySalesBtn" style="display:none; position:relative;" data-i18n="myTickets">
      🎫 Meine Verkäufe
      <span id="salesDot" style="display:none; position:absolute; top:-5px; right:-5px; width:12px; height:12px; background:red; border-radius:50%; box-shadow:0 0 5px red;"></span>
    </a>
  </div>

  <!-- FILTER -->
  <div class="filter-bar" style="margin-bottom: 20px;">
    <input type="text" id="searchInput" data-i18n="searchPlaceholder" placeholder="Suche..." onkeyup="filterTickets()" style="padding:10px; border-radius:10px; background:rgba(0,0,0,0.3); border:1px solid var(--glass-border); color:white; width: 100%; margin-bottom: 15px; box-sizing: border-box;">
    
    <div class="category-bubbles" id="categoryBubbles">
      <button class="bubble active" onclick="setCategory('all')">Alles</button>
      <button class="bubble" onclick="setCategory('Fußball')">⚽️ Fußball</button>
      <button class="bubble" onclick="setCategory('Basketball')">🏀 Basketball</button>
      <button class="bubble" onclick="setCategory('American Football')">🏈 Football</button>
      <button class="bubble" onclick="setCategory('Konzert')">🎸 Konzert</button>
      <button class="bubble" onclick="setCategory('Handball')">🤾‍♂️ Handball</button>
      <button class="bubble" onclick="setCategory('Eishockey')">🏒 Eishockey</button>
      <button class="bubble" onclick="setCategory('Tennis')">🎾 Tennis</button>
      <button class="bubble" onclick="setCategory('Motorsport')">🏎️ Motorsport</button>
      <button class="bubble" onclick="setCategory('Wintersport')">⛷️ Wintersport</button>
      <button class="bubble" onclick="setCategory('Schwimmen')">🏊‍♂️ Schwimmen</button>
      <button class="bubble" onclick="setCategory('Rugby')">🏉 Rugby</button>
      <button class="bubble" onclick="setCategory('Musical')">🎭 Musical</button>
      <button class="bubble" onclick="setCategory('Theater/Comedy')">🎬 Theater</button>
      <button class="bubble" onclick="setCategory('Olympia/Turnier')">🏆 Turnier</button>
      <button class="bubble" onclick="setCategory('Sonstiges')">🎫 Sonstiges</button>
    </div>
  </div>

  <!-- TICKETS GRID -->
  <div id="tickets" class="tickets-grid"></div>

</div>

<script>
// ================= USER =================
let currentUser = localStorage.getItem("pi_user") || null;
let favorites = [];

function updateUI() {
  const userEl = document.getElementById("user");
  const loginBtn = document.getElementById("loginBtn");
  const logoutBtn = document.getElementById("logoutBtn");
  const mySalesBtn = document.getElementById("mySalesBtn");

  const myPurchasesBtn = document.getElementById("myPurchasesBtn");

  if (currentUser) {
    userEl.innerText = "👤 " + currentUser;
    loginBtn.style.display = "none";
    logoutBtn.style.display = "inline-flex";
    mySalesBtn.style.display = "inline-flex";
    myPurchasesBtn.style.display = "inline-flex";
    loadFavorites();
    checkNotifications();
  } else {
    userEl.innerText = "";
    loginBtn.style.display = "inline-flex";
    logoutBtn.style.display = "none";
    mySalesBtn.style.display = "none";
    myPurchasesBtn.style.display = "none";
  }

  // Active language button
  document.getElementById("lang-de").classList.toggle("active", currentLang === "de");
  document.getElementById("lang-en").classList.toggle("active", currentLang === "en");
}

window.addEventListener("DOMContentLoaded", () => {
  updateUI();
});

// PI INIT
Pi.init({ version: "2.0", sandbox: true });

const onIncompletePaymentFound = async (payment) => {
  console.log("Incomplete payment found:", payment);
  try {
    if (payment.transaction && payment.transaction.txid) {
      await fetch("https://rucejmhjgfvlntoxhczm.supabase.co/functions/v1/verify-payment", {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ action: "complete", paymentId: payment.identifier, txid: payment.transaction.txid })
      });
    } else {
      await fetch("https://rucejmhjgfvlntoxhczm.supabase.co/functions/v1/verify-payment", {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ action: "approve", paymentId: payment.identifier })
      });
    }
  } catch (e) {
    console.error("Error handling incomplete payment:", e);
  }
};

// LOGIN
async function loginPi() {
  try {
    const auth = await Pi.authenticate(['username', 'payments'], onIncompletePaymentFound);
    currentUser = auth.user.username;
    localStorage.setItem("pi_user", currentUser);
    updateUI();
  } catch (e) {
    alert("Login nur im Pi Browser möglich");
  }
}

// LOGOUT
function logout() {
  localStorage.removeItem("pi_user");
  currentUser = null;
  favorites = [];
  updateUI();
  render();
}

document.getElementById("loginBtn").onclick = loginPi;
document.getElementById("logoutBtn").onclick = logout;

// ================= SUPABASE =================
const db = window.supabase.createClient(
  "https://rucejmhjgfvlntoxhczm.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ1Y2VqbWhqZ2Z2bG50b3hoY3ptIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1NTU4OTcsImV4cCI6MjA5MDEzMTg5N30.Eq1vP38qyX0c-m23mceGg-gxZD_mn4sOyGqVxZMRoFk"
);

// ================= FAVORITEN =================
async function loadFavorites() {
  if (!currentUser) return;
  const { data } = await db.from("favorites").select("*").eq("user_id", currentUser);
  if (!data) return;
  favorites = data.map(f => f.ticket_id);
  render();
}

async function toggleFavorite(ticketId, event) {
  event.stopPropagation();
  if (!currentUser) {
    alert(t("notLoggedIn"));
    return;
  }
  const exists = favorites.includes(ticketId);
  if (exists) {
    await db.from("favorites").delete().eq("user_id", currentUser).eq("ticket_id", ticketId);
  } else {
    await db.from("favorites").insert({ user_id: currentUser, ticket_id: ticketId });
  }
  loadFavorites();
}

// ================= TICKETS =================
let ticketsData = [];

async function loadTickets() {
  const { data } = await db.from("tickets").select("*").order("created_at", { ascending: false });
  ticketsData = data || [];
  render();
}

function filterTickets() {
  render();
}

let currentCategory = 'all';
function setCategory(cat) {
  currentCategory = cat;
  const bubbles = document.getElementById("categoryBubbles").children;
  for(let i=0; i<bubbles.length; i++) {
    bubbles[i].classList.remove("active");
    if(bubbles[i].getAttribute("onclick").includes(`'${cat}'`)) {
      bubbles[i].classList.add("active");
    }
  }
  filterTickets();
}

// ================= NOTIFICATIONS =================
async function checkNotifications() {
  if(!currentUser) return;
  
  // Check if seller has paid orders (needs shipping)
  const { data: salesInfo } = await db.from("orders").select("id").eq("seller", currentUser).eq("status", "paid");
  if(salesInfo && salesInfo.length > 0) {
    document.getElementById("salesDot").style.display = "block";
  } else {
    document.getElementById("salesDot").style.display = "none";
  }

  // Check if buyer has shipped orders (needs rating/confirmation)
  const { data: purchaseInfo } = await db.from("orders").select("id").eq("buyer", currentUser).eq("status", "shipped");
  if(purchaseInfo && purchaseInfo.length > 0) {
    document.getElementById("purchasesDot").style.display = "block";
  } else {
    document.getElementById("purchasesDot").style.display = "none";
  }
}

// ================= RENDER =================
function render() {
  const el = document.getElementById("tickets");
  el.innerHTML = "";
  
  const selectedCategory = currentCategory;
  const searchTerm = document.getElementById("searchInput").value.toLowerCase();

  ticketsData.forEach(tick => {
    if (tick.quantity <= 0) return;
    if (selectedCategory !== "all" && tick.category !== selectedCategory) return;
    
    if (searchTerm) {
      const matchTitle = tick.title && tick.title.toLowerCase().includes(searchTerm);
      const matchLoc = tick.location && tick.location.toLowerCase().includes(searchTerm);
      if(!matchTitle && !matchLoc) return;
    }

    const isFav = favorites.includes(tick.id);
    const availableText = t("available", { n: tick.quantity || 1 });

    el.innerHTML += `
      <div class="card" onclick="window.location.href='ticket.html?id=${tick.id}'" style="cursor:pointer;">
        ${tick.image ? `<img src="${tick.image}">` : ""}
        <div class="card-content">
          <div class="tag">${tick.category}</div>
          <h3 class="card-title">${tick.title}</h3>
          <p style="color: var(--text-muted); font-size: 14px; margin-bottom: 15px;">${tick.description.substring(0, 50)}...</p>
          <p style="color: var(--success); font-weight: bold; font-size: 14px; margin-bottom: 5px;">📦 ${availableText}</p>
          
          <div class="card-footer">
            <span class="price">${tick.price} Pi</span>
            <span class="heart" onclick="toggleFavorite(${tick.id}, event)">
              ${isFav ? "❤️" : "🤍"}
            </span>
          </div>
        </div>
      </div>
    `;
  });
}

// Override setLanguage to also re-render tickets
const originalSetLanguage = setLanguage;
window.setLanguage = function(lang) {
  originalSetLanguage(lang);
  updateUI();
  render();
}

// ================= INIT =================
loadTickets();

</script>
</body>
</html>
