<!DOCTYPE html>
<html>
<head>
  <title>Ticket Marketplace</title>
  <script src="https://sdk.minepi.com/pi-sdk.js"></script>
</head>

<body style="text-align:center; font-family:sans-serif; padding:40px;">

  <h1>🎟️ Ticket Marketplace</h1>

  <h2 id="user">Connecting...</h2>

  <button onclick="pay()" id="payBtn" disabled style="padding:15px 30px; font-size:18px;">
    Buy Ticket (0.1 Pi)
  </button>

  <p id="status"></p>

<script>
let currentUser = null;

async function start() {
  try {
    // 🔥 Sicherstellen dass Pi geladen ist
    if (!window.Pi) {
      document.getElementById("user").innerText = "Open in Pi Browser";
      return;
    }

    // 🔥 INIT (wichtig await!)
    await Pi.init({ version: "2.0" });

    // 🔥 kleine Pause (sehr wichtig bei Pi)
    await new Promise(resolve => setTimeout(resolve, 300));

    // 🔥 AUTH mit handler
    const auth = await Pi.authenticate(['payments'], onIncompletePayment);

    currentUser = auth.user;

    document.getElementById("user").innerText =
      "Hello " + (currentUser.username || currentUser.uid || "Pi User");

    document.getElementById("status").innerText = "Ready";

    // 🔥 Button freigeben
    document.getElementById("payBtn").disabled = false;

  } catch (e) {
    console.error("AUTH ERROR:", e);
    document.getElementById("user").innerText = "Login failed";
  }
}

async function pay() {
  if (!currentUser) {
    alert("Not logged in");
    return;
  }

  try {
    await Pi.createPayment({
      amount: 0.1,
      memo: "Ticket purchase",
      metadata: { type: "ticket" }
    }, {
      onReadyForServerApproval: function(paymentId) {
        return fetch("/.netlify/functions/approve-payment", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ paymentId, action: "approve" })
        });
      },

      onReadyForServerCompletion: function(paymentId, txid) {
        document.getElementById("status").innerText = "Payment success";

        return fetch("/.netlify/functions/approve-payment", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ paymentId, txid, action: "complete" })
        });
      },

      onCancel: function() {
        document.getElementById("status").innerText = "Cancelled";
      },

      onError: function(error) {
        document.getElementById("status").innerText = "Error: " + error;
      }
    });

  } catch (err) {
    console.error("PAYMENT ERROR:", err);
  }
}

// 🔥 Pflicht für payments scope
function onIncompletePayment(payment) {
  return fetch("/.netlify/functions/approve-payment", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      paymentId: payment.identifier,
      action: "complete"
    })
  });
}

// 🔥 Start
start();
</script>

</body>
</html>
