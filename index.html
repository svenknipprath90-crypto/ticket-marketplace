<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Pi Ticket Marketplace</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://sdk.minepi.com/pi-sdk.js"></script>

<style>
body {
  margin:0;
  font-family:sans-serif;
  background:#0b1220;
  color:white;
}

.header {
  padding:20px;
  font-size:22px;
  font-weight:bold;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.top-buttons {
  padding:15px;
}

.button {
  display:inline-block;
  margin-right:10px;
  padding:12px 18px;
  background:#2563eb;
  color:white;
  border-radius:10px;
  text-decoration:none;
  font-weight:bold;
  border:none;
  cursor:pointer;
}

#loginBtn {
  background:#16a34a;
}

#logoutBtn {
  background:#dc2626;
  display:none;
}

#tickets {
  padding:15px;
}

.card {
  background:#1e293b;
  border-radius:15px;
  margin-bottom:20px;
  overflow:hidden;
}

.card img {
  width:100%;
  height:220px;
  object-fit:cover;
}

.content {
  padding:15px;
}

.heart {
  font-size:28px;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="header">
  <div>Pi Ticket Marketplace</div>
  <div id="user"></div>
</div>

<div class="top-buttons">
  <button id="loginBtn" class="button">🔐 Login mit Pi</button>
  <button id="logoutBtn" class="button">🚪 Logout</button>
  <a href="create.html" class="button">➕ Ticket erstellen</a>
  <a href="favorites.html" class="button">❤️ Favoriten</a>
</div>

<div id="tickets"></div>

<script>

// ================= USER =================

let currentUser = localStorage.getItem("pi_user") || null;
let favorites = [];

function updateUI() {
  const userEl = document.getElementById("user");
  const loginBtn = document.getElementById("loginBtn");
  const logoutBtn = document.getElementById("logoutBtn");

  if (currentUser) {
    userEl.innerText = "👤 " + currentUser;
    loginBtn.style.display = "none";
    logoutBtn.style.display = "inline-block";
    loadFavorites();
  } else {
    userEl.innerText = "";
    loginBtn.style.display = "inline-block";
    logoutBtn.style.display = "none";
  }
}

// LOGIN
async function loginPi() {
  try {
    await Pi.init({ version: "2.0" });

    const auth = await Pi.authenticate(['username'], () => {});
    currentUser = auth.user.username;

    localStorage.setItem("pi_user", currentUser);

    updateUI();

  } catch (e) {
    alert("Login nur im Pi Browser möglich");
  }
}

// LOGOUT
function logout() {
  localStorage.removeItem("pi_user");
  currentUser = null;
  favorites = [];
  updateUI();
  render();
}

document.getElementById("loginBtn").onclick = loginPi;
document.getElementById("logoutBtn").onclick = logout;


// ================= SUPABASE =================

const db = window.supabase.createClient(
  "https://rucejmhjgfvlntoxhczm.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ1Y2VqbWhqZ2Z2bG50b3hoY3ptIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1NTU4OTcsImV4cCI6MjA5MDEzMTg5N30.Eq1vP38qyX0c-m23mceGg-gxZD_mn4sOyGqVxZMRoFk"
);


// ================= FAVORITEN =================

async function loadFavorites() {
  if (!currentUser) return;

  const { data } = await db
    .from("favorites")
    .select("*")
    .eq("user_id", currentUser);

  if (!data) return;

  favorites = data.map(f => f.ticket_id);
  render();
}

async function toggleFavorite(ticketId) {

  if (!currentUser) {
    alert("Bitte erst einloggen!");
    return;
  }

  const exists = favorites.includes(ticketId);

  if (exists) {

    await db
      .from("favorites")
      .delete()
      .eq("user_id", currentUser)
      .eq("ticket_id", ticketId);

  } else {

    await db
      .from("favorites")
      .insert({
        user_id: currentUser,
        ticket_id: ticketId
      });
  }

  loadFavorites();
}


// ================= TICKETS =================

let ticketsData = [];

async function loadTickets() {

  const { data } = await db
    .from("tickets")
    .select("*")
    .order("created_at", { ascending: false });

  ticketsData = data || [];
  render();
}


// ================= RENDER =================

function render() {

  const el = document.getElementById("tickets");
  el.innerHTML = "";

  ticketsData.forEach(t => {

    const isFav = favorites.includes(t.id);

    el.innerHTML += `
      <div class="card">
        ${t.image ? `<img src="${t.image}">` : ""}
        <div class="content">
          <h3>${t.title}</h3>
          <p>${t.category}</p>
          <p>${t.description}</p>
          <strong>${t.price} Pi</strong>
          <br><br>

          <span class="heart" onclick="toggleFavorite(${t.id})">
            ${isFav ? "❤️" : "🤍"}
          </span>

        </div>
      </div>
    `;
  });
}


// ================= INIT =================

updateUI();
loadTickets();

</script>

</body>
</html>
