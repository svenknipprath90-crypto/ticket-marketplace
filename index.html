<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ticket Marketplace Pi</title>
  <script src="https://sdk.minepi.com/pi-sdk.js"></script>
  <style>
    :root { --purple: #6f2dbd; --gold: #f0ad3d; --bg: #f4f4f6; }
    body { font-family: sans-serif; background: var(--bg); padding: 20px; text-align: center; }
    .card { background: white; border-radius: 15px; padding: 20px; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); max-width: 500px; margin-left: auto; margin-right: auto; }
    button { width: 100%; padding: 12px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; margin-top: 10px; font-size: 16px; }
    .btn-pi { background: var(--purple); color: white; }
    .btn-buy { background: var(--gold); color: white; }
    input { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
    .ticket { border: 1px solid #eee; padding: 15px; border-radius: 10px; margin-top: 10px; background: #fff; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Ticket Marketplace</h1>
    
    <div class="card">
      <div id="status">Not logged in</div>
      <button id="loginBtn" class="btn-pi">1. Login with Pi</button>
    </div>

    <div class="card">
      <h3>2. List a Ticket</h3>
      <input id="name" placeholder="Event Name (e.g. Concert)">
      <input id="price" type="number" step="0.01" placeholder="Price in Pi (e.g. 0.1)">
      <button onclick="addTicket()" class="btn-pi">List Ticket</button>
    </div>

    <div class="card">
      <h3>3. Available Tickets</h3>
      <div id="list">No tickets available.</div>
    </div>
  </div>

  <script>
    const Pi = window.Pi;
    // Keep sandbox: true for the checklist verification
    Pi.init({ version: "2.0", sandbox: true });

    let user = null;
    let tickets = JSON.parse(localStorage.getItem('pi_tickets_simple') || '[]');

    async function login() {
      try {
        const auth = await Pi.authenticate(['username', 'payments'], (p) => {
          console.log("Incomplete payment found:", p);
        });
        user = auth.user;
        document.getElementById('status').innerHTML = `<b style="color:green">Logged in as: ${user.username}</b>`;
        render();
      } catch (e) { 
        alert("Login failed. Please open this app inside the Pi Browser!"); 
      }
    }

    function addTicket() {
      const n = document.getElementById('name').value;
      const p = parseFloat(document.getElementById('price').value);
      if(!n || isNaN(p)) return alert("Please enter a valid name and price");
      tickets.push({ id: Date.now(), name: n, price: p });
      localStorage.setItem('pi_tickets_simple', JSON.stringify(tickets));
      render();
    }

    function render() {
      const div = document.getElementById('list');
      if(tickets.length === 0) {
        div.innerHTML = "No tickets available.";
        return;
      }
      div.innerHTML = tickets.map(t => `
        <div class="ticket">
          <strong>${t.name}</strong><br>Price: ${t.price} Pi<br>
          <button class="btn-buy" onclick="pay(${t.id})">BUY (Test-Payment)</button>
        </div>
      `).join('');
    }

    async function pay(id) {
      if(!user) return alert("Please login first!");
      const t = tickets.find(x => x.id === id);
      
      try {
        await Pi.createPayment({
          amount: t.price,
          memo: "Test Purchase: " + t.name,
          metadata: { ticketId: id }
        }, {
          onReadyForServerApproval: (paymentId) => {
            console.log("Payment started, ID:", paymentId);
            // In Sandbox/Demo mode, this is handled via the Developer Portal settings
          },
          onReadyForServerCompletion: (paymentId, txid) => {
            alert("SUCCESS! Transaction completed.\nTXID: " + txid);
            tickets = tickets.filter(x => x.id !== id);
            localStorage.setItem('pi_tickets_simple', JSON.stringify(tickets));
            render();
          },
          onCancel: (pId) => console.log("Payment cancelled", pId),
          onError: (err, p) => alert("Error: " + err.message)
        });
      } catch (e) { 
        alert("Could not start payment."); 
      }
    }

    document.getElementById('loginBtn').onclick = login;
    render();
  </script>
</body>
</html>
