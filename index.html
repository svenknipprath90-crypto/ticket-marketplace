<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ticket Marketplace Pi</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background-color: #f0f2f5; }
        .container { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); max-width: 400px; margin: auto; }
        .btn-pay { width: 100%; padding: 15px; background: #673ab7; color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 1.1em; }
        #status-text { margin-top: 20px; font-weight: bold; color: #673ab7; font-size: 1.2em; }
        #debug-text { margin-top: 10px; font-size: 12px; color: red; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎟️ Ticket Marketplace</h1>
        <p>System-Check: Version 4.1 (Stable)</p>
        <button class="btn-pay" onclick="pay()">Ticket kaufen (0.1 Pi)</button>
        <div id="status-text">Warte auf Pi...</div>
        <div id="debug-text"></div>
    </div>

    <script>
        const statusEl = document.getElementById('status-text');
        const debugEl = document.getElementById('debug-text');

        async function startApp() {
            if (typeof Pi !== 'undefined') {
                try {
                    // Schritt 1: Initialisieren
                    await Pi.init({ version: "1.5" });
                    statusEl.innerText = "✅ Pi System bereit!";
                    
                    // Schritt 2: Kurz warten, dann erst Authentifizieren
                    setTimeout(async () => {
                        try {
                            const auth = await Pi.authenticate(['payments'], onIncompletePaymentFound);
                            console.log("Eingeloggt!");
                        } catch (e) {
                            debugEl.innerText = "Login-Check: " + e.message;
                        }
                    }, 1000);

                } catch (err) {
                    debugEl.innerText = "Init-Fehler: " + err.message;
                }
            } else {
                statusEl.innerText = "Bitte im Pi Browser öffnen!";
            }
        }

        async function onIncompletePaymentFound(payment) {
            await fetch('/api/approve-payment', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ paymentId: payment.identifier, action: 'complete' })
            });
        }

        function pay() {
            statusEl.innerText = "Zahlung wird gestartet...";
            Pi.createPayment({
                amount: 0.1,
                memo: "Ticket Kauf Test",
                metadata: { orderId: "12345" }
            }, {
                onReadyForServerApproval: (id) => {
                    fetch('/api/approve-payment', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ paymentId: id, action: 'approve' })
                    });
                },
                onReadyForServerCompletion: (id, txid) => {
                    fetch('/api/approve-payment', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ paymentId: id, action: 'complete', txid: txid })
                    });
                    alert("Zahlung erfolgreich!");
                },
                onCancel: () => { statusEl.innerText = "Abgebrochen."; },
                onError: (e) => { debugEl.innerText = "Fehler: " + e.message; }
            });
        }

        window.onload = startApp;
    </script>
</body>
</html>
