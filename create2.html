<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Create Ticket</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  
  <link rel="stylesheet" href="style.css">
  <script src="i18n.js"></script>
</head>
<body>

<div class="container">
  <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
    <a href="index.html" class="btn btn-glass" data-i18n="back">⬅ Zurück</a>
    <div class="lang-toggle">
      <button class="lang-btn" id="lang-de" onclick="setLanguage('de'); window.location.reload();">🇩🇪</button>
      <button class="lang-btn" id="lang-en" onclick="setLanguage('en'); window.location.reload();">🇬🇧</button>
    </div>
  </div>

  <div class="glass-panel">
    <h1 style="margin-top:0;" data-i18n="createTitle">Ticket erstellen</h1>

    <div class="form-group">
      <input id="title" placeholder="Title / Titel des Tickets">
    </div>

    <div class="form-group">
      <select id="category">
        <option value="Fußball">Fußball</option>
        <option value="Basketball">Basketball</option>
        <option value="American Football">American Football</option>
        <option value="Handball">Handball</option>
        <option value="Rugby">Rugby</option>
        <option value="Eishockey">Eishockey</option>
        <option value="Tennis">Tennis</option>
        <option value="Schwimmen">Schwimmen</option>
        <option value="Wintersport">Wintersport</option>
        <option value="Motorsport">Motorsport</option>
        <option value="Olympia/Turnier">Olympia / Großturnier</option>
        <option value="Konzert">Konzert</option>
        <option value="Musical">Musical</option>
        <option value="Theater/Comedy">Theater / Comedy</option>
        <option value="Sonstiges">Sonstiges</option>
      </select>
    </div>

    <div class="form-group">
      <input id="location" data-i18n="location" placeholder="Liga / Zusatzinfo (optional)">
    </div>

    <div class="form-group">
      <input id="price" type="number" data-i18n="price" placeholder="Preis (in Pi)" min="0" step="0.01">
    </div>

    <div class="form-group">
      <input id="quantity" type="number" data-i18n="quantity" placeholder="Anzahl / Verfügbarkeit" value="1" min="1">
    </div>

    <div class="form-group">
      <textarea id="description" data-i18n="description" placeholder="Beschreibung" rows="4"></textarea>
    </div>

    <div class="form-group">
      <label data-i18n="image">Bild hochladen:</label>
      <input type="file" id="image" accept="image/*">
    </div>

    <button id="createBtn" class="btn btn-success" style="width: 100%; font-size: 18px;" data-i18n="saveBtn" onclick="createTicket()">
      Ticket speichern
    </button>
  </div>
</div>

<script>
  document.addEventListener("DOMContentLoaded", () => {
    document.getElementById("lang-de").classList.toggle("active", currentLang === "de");
    document.getElementById("lang-en").classList.toggle("active", currentLang === "en");
  });

  const supabase = window.supabase.createClient(
    "https://rucejmhjgfvlntoxhczm.supabase.co",
    "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ1Y2VqbWhqZ2Z2bG50b3hoY3ptIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1NTU4OTcsImV4cCI6MjA5MDEzMTg5N30.Eq1vP38qyX0c-m23mceGg-gxZD_mn4sOyGqVxZMRoFk"
  );

  async function createTicket() {
    alert("Klick registriert! Fange an...");
    try {
      const title = document.getElementById("title").value.trim();
      const category = document.getElementById("category").value;
      const location = document.getElementById("location").value.trim();
      let priceStr = document.getElementById("price").value;
      const quantity = document.getElementById("quantity").value || 1;
      const description = document.getElementById("description").value.trim();
      const file = document.getElementById("image").files[0];

      if(!title || !priceStr) {
        alert("Titel und Preis sind erforderlich!");
        return;
      }

      priceStr = priceStr.replace(',', '.');
      const parsedPrice = Number(priceStr);
      if (isNaN(parsedPrice)) {
        alert("Bitte einen gültigen Preis eingeben (z.B. 10.50)");
        return;
      }

      document.getElementById("createBtn").innerText = "Lade hoch... / Uploading...";
      document.getElementById("createBtn").disabled = true;

      let imageUrl = "";

      if (file) {
        const fileName = Date.now() + "_" + file.name.replace(/[^a-zA-Z0-9.\-_]/g, '');
        const { data, error: uploadError } = await supabase.storage.from("tickets").upload(fileName, file);

        if (uploadError) {
          alert(t("uploadError") + ": " + (uploadError.message || "Unbekannter Fehler"));
          document.getElementById("createBtn").innerText = t("saveBtn");
          document.getElementById("createBtn").disabled = false;
          return;
        }
        imageUrl = `https://rucejmhjgfvlntoxhczm.supabase.co/storage/v1/object/public/tickets/${fileName}`;
      }

      const currentUser = localStorage.getItem("pi_user") || "Unknown";

      const { error } = await supabase.from("tickets").insert([
        {
          title: title,
          category: category,
          location: location,
          price: parsedPrice,
          quantity: Number(quantity),
          description: description,
          image: imageUrl,
          seller: currentUser
        }
      ]);

      if (error) {
        alert(t("dbError") + ": " + (error.message || JSON.stringify(error)));
        document.getElementById("createBtn").innerText = t("saveBtn");
        document.getElementById("createBtn").disabled = false;
      } else {
        alert("Ticket erfolgreich erstellt!");
        window.location.href = "index.html";
      }
    } catch (err) {
      console.error(err);
      alert("Fehler: " + err.message);
      document.getElementById("createBtn").innerText = t("saveBtn");
      document.getElementById("createBtn").disabled = false;
    }
  }
</script>

</body>
</html>
