<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Create Ticket</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body style="background:#0b1220;color:white;font-family:sans-serif;padding:20px;">

  <h1>Create Ticket</h1>

  <input id="title" placeholder="Title" style="display:block;margin:10px 0;padding:10px;width:300px;">
  <input id="category" placeholder="Category" style="display:block;margin:10px 0;padding:10px;width:300px;">
  <input id="price" placeholder="Price" type="number" style="display:block;margin:10px 0;padding:10px;width:300px;">
  <textarea id="description" placeholder="Description" style="display:block;margin:10px 0;padding:10px;width:300px;"></textarea>
  <input type="file" id="image" style="margin:10px 0;">

  <button onclick="createTicket()" style="padding:15px 30px;background:green;color:white;border:none;">
    Create Ticket
  </button>

  <script>
    const supabase = window.supabase.createClient(
      "https://rucejmhjgfvlntoxhczm.supabase.co",
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ1Y2VqbWhqZ2Z2bG50b3hoY3ptIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1NTU4OTcsImV4cCI6MjA5MDEzMTg5N30.Eq1vP38qyX0c-m23mceGg-gxZD_mn4sOyGqVxZMRoFk"
    );

    async function createTicket() {
      const title = document.getElementById("title").value;
      const category = document.getElementById("category").value;
      const price = document.getElementById("price").value;
      const description = document.getElementById("description").value;
      const file = document.getElementById("image").files[0];

      let imageUrl = "";

      // 🔥 Upload Bild
      if (file) {
        const fileName = Date.now() + "_" + file.name;

        const { error: uploadError } = await supabase.storage
          .from("tickets")
          .upload(fileName, file);

        if (uploadError) {
          alert("Upload Fehler: " + uploadError.message);
          console.log(uploadError);
          return;
        }

        const { data } = supabase.storage
          .from("tickets")
          .getPublicUrl(fileName);

        imageUrl = data.publicUrl;
      }

      // 🔥 In DB speichern
      const { error } = await supabase.from("tickets").insert([
        {
          title: title,
          category: category,
          price: Number(price),
          description: description,
          image: imageUrl
        }
      ]);

      if (error) {
        alert("DB Fehler: " + error.message);
        console.log(error);
      } else {
        alert("Ticket erstellt!");
        window.location.href = "index.html";
      }
    }
  </script>

</body>
</html>
