<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Create Ticket</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body style="background:#0b1220;color:white;font-family:sans-serif;padding:20px;">

<h1>Create Ticket</h1>

<input id="title" placeholder="Title"><br><br>
<input id="category" placeholder="Category"><br><br>
<input id="price" type="number" placeholder="Price"><br><br>
<textarea id="description" placeholder="Description"></textarea><br><br>
<input type="file" id="image"><br><br>

<button id="createBtn" style="padding:10px;background:green;color:white;">
  Create Ticket
</button>

<script>
const supabase = window.supabase.createClient(
  "https://rucejmhjgfvlntoxhczm.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ1Y2VqbWhqZ2Z2bG50b3hoY3ptIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1NTU4OTcsImV4cCI6MjA5MDEzMTg5N30.Eq1vP38qyX0c-m23mceGg-gxZD_mn4sOyGqVxZMRoFk"
);

// 🔥 WICHTIG: EventListener statt onclick
document.getElementById("createBtn").addEventListener("click", async () => {

  alert("Button funktioniert"); // <-- TEST

  const title = document.getElementById("title").value;
  const category = document.getElementById("category").value;
  const price = document.getElementById("price").value;
  const description = document.getElementById("description").value;
  const file = document.getElementById("image").files[0];

  let imageUrl = "";

  if (file) {
    const fileName = Date.now() + "_" + file.name;

    const { error: uploadError } = await supabase.storage
      .from("tickets")
      .upload(fileName, file);

    if (uploadError) {
      alert("Upload Fehler: " + uploadError.message);
      return;
    }

    const { data } = supabase.storage
      .from("tickets")
      .getPublicUrl(fileName);

    imageUrl = data.publicUrl;
  }

  const { error } = await supabase.from("tickets").insert([
    {
      title: title,
      category: category,
      price: Number(price),
      description: description,
      image: imageUrl
    }
  ]);

  if (error) {
    alert("DB Fehler: " + error.message);
  } else {
    alert("Ticket erstellt!");
  }

});
</script>

</body>
</html>
