<!DOCTYPE html>
<html>
<head>
  <title>Create Ticket</title>
</head>

<body style="font-family: Arial; text-align:center;">

  <h1>➕ Create Ticket</h1>

  <input id="title" placeholder="Title" /><br><br>
  
  <input id="price" placeholder="Price (Pi)" type="number" step="0.01"/><br><br>

  <select id="category">
    <option value="Sport">Sport</option>
    <option value="Concert">Concert</option>
    <option value="Other">Other</option>
  </select><br><br>

  <!-- 🔥 NEU: Bild URL -->
  <input id="image" placeholder="Image URL (optional)" /><br><br>

  <textarea id="desc" placeholder="Description"></textarea><br><br>

  <button onclick="createTicket()">Create</button>
  <br><br>
  <button onclick="goBack()">⬅ Back</button>

<script>
function createTicket() {
  const title = document.getElementById("title").value;
  const price = parseFloat(document.getElementById("price").value);
  const desc = document.getElementById("desc").value;
  const category = document.getElementById("category").value;
  const image = document.getElementById("image").value;

  const user = localStorage.getItem("username") || "Unknown";

  if (!title || !price) {
    alert("Please fill all fields");
    return;
  }

  const newTicket = {
    title,
    price,
    desc,
    category,
    seller: user,
    image
  };

  let tickets = JSON.parse(localStorage.getItem("tickets")) || [];
  tickets.push(newTicket);

  localStorage.setItem("tickets", JSON.stringify(tickets));

  alert("Ticket created!");

  window.location.href = "index.html";
}

function goBack() {
  window.location.href = "index.html";
}
</script>

</body>
</html>
