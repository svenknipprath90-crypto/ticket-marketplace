<!DOCTYPE html>
<html>
<head>
  <title>Create Ticket</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
</head>

<body style="background:#0f172a; color:white; font-family:Arial; padding:20px;">

<h2 style="margin-bottom:20px;">Create Ticket</h2>

<input id="title" placeholder="Title" style="width:100%; padding:10px; margin-bottom:10px; border-radius:8px; border:none;"><br>

<input id="category" placeholder="Category" style="width:100%; padding:10px; margin-bottom:10px; border-radius:8px; border:none;"><br>

<input id="price" placeholder="Price" style="width:100%; padding:10px; margin-bottom:10px; border-radius:8px; border:none;"><br>

<textarea id="description" placeholder="Description" style="width:100%; padding:10px; margin-bottom:10px; border-radius:8px; border:none;"></textarea><br>

<input type="file" id="image" style="margin-bottom:15px;"><br>

<button onclick="createTicket()" style="
  background:#22c55e;
  color:white;
  border:none;
  padding:12px;
  width:100%;
  border-radius:10px;
  font-size:16px;
">
  Create Ticket
</button>

<script>

// 🔥 SUPABASE CONNECT (FIXED KEY)
const supabase = window.supabase.createClient(
  "https://rucejmhjgfvlntoxhczm.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ1Y2VqbWhqZ2Z2bG50b3hoY3ptIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1NTU4OTcsImV4cCI6MjA5MDEzMTg5N30.Eq1vP38qyX0c-m23mceGg-gxZD_mn4sOyGqVxZMRoFk"
);

async function createTicket() {

  const title = document.getElementById("title").value;
  const category = document.getElementById("category").value;
  const price = document.getElementById("price").value;
  const description = document.getElementById("description").value;
  const file = document.getElementById("image").files[0];

  let imageUrl = "";

  // 📸 IMAGE UPLOAD
  if (file) {
    const fileName = Date.now() + "_" + file.name;

    const { error: uploadError } = await supabase.storage
      .from("tickets")
      .upload(fileName, file);

    if (uploadError) {
      alert("Image upload failed");
      console.log(uploadError);
      return;
    }

    const { data } = supabase.storage
      .from("tickets")
      .getPublicUrl(fileName);

    imageUrl = data.publicUrl;
  }

  // 💾 SAVE TO DATABASE
  const { error } = await supabase.from("tickets").insert([
    {
      title: title,
      category: category,
      price: Number(price),
      description: description,
      image_url: imageUrl
    }
  ]);

  if (error) {
    alert("Error saving ticket!");
    console.log(error);
    return;
  }

  alert("Ticket created!");
  window.location.href = "index.html";
}

</script>

</body>
</html>
