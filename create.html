<!DOCTYPE html>
<html>
<head>
  <title>Create Ticket</title>

  <style>
    body {
      font-family: Arial;
      background: linear-gradient(180deg, #020617, #0f172a);
      color: white;
      margin: 0;
    }

    header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 15px;
      background: rgba(255,255,255,0.05);
    }

    header img {
      width: 35px;
      height: 35px;
      border-radius: 8px;
    }

    .container {
      padding: 15px;
    }

    .card {
      background: rgba(255,255,255,0.05);
      padding: 20px;
      border-radius: 16px;
      margin-top: 20px;
    }

    input, select {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border-radius: 10px;
      border: none;
    }

    label {
      font-size: 13px;
      color: #94a3b8;
      margin-top: 10px;
      display: block;
    }

    .create-btn {
      margin-top: 15px;
      width: 100%;
      padding: 14px;
      background: #6366f1;
      color: white;
      border: none;
      border-radius: 12px;
      font-weight: bold;
    }

    .back-btn {
      margin-top: 10px;
      width: 100%;
      padding: 10px;
      background: #334155;
      color: white;
      border: none;
      border-radius: 10px;
    }
  </style>
</head>

<body>

<header>
  <img src="0ED2A097-4CDA-417A-A473-BCD55056B90E.png?v=1">
  <span>Create Ticket</span>
</header>

<div class="container">

  <div class="card">

    <label>Title</label>
    <input id="title">

    <label>Main Category</label>
    <select id="mainCategory" onchange="updateSubcategories()">
      <option>Sport</option>
      <option>Music</option>
      <option>Comedy</option>
      <option>Theater</option>
      <option>Festival</option>
      <option>Other</option>
    </select>

    <label>Sub Category</label>
    <select id="subCategory"></select>

    <label>Price (Pi)</label>
    <input id="price" type="number" step="0.01">

    <label>Image URL</label>
    <input id="image">

    <button class="create-btn" onclick="createTicket()">Create Ticket</button>

  </div>

  <button class="back-btn" onclick="back()">⬅ Back</button>

</div>

<script>
const categories = {
  Sport: [
    "Football",
    "Basketball",
    "Tennis",
    "MMA / Boxing",
    "American Football",
    "Ice Hockey",
    "Motorsport",
    "Handball",
    "Volleyball",
    "Baseball"
  ],
  Music: ["Pop", "Rap", "EDM", "Rock", "Classical"],
  Comedy: ["Stand-up", "Live Show"],
  Theater: ["Drama", "Musical"],
  Festival: ["Open Air", "Weekend Festival"],
  Other: ["General"]
};

function updateSubcategories() {
  const main = document.getElementById("mainCategory").value;
  const sub = document.getElementById("subCategory");

  sub.innerHTML = "";

  categories[main].forEach(c => {
    sub.innerHTML += `<option>${c}</option>`;
  });
}

function createTicket() {
  const title = document.getElementById("title").value;
  const main = document.getElementById("mainCategory").value;
  const sub = document.getElementById("subCategory").value;
  const price = parseFloat(document.getElementById("price").value);
  const image = document.getElementById("image").value;

  const username = localStorage.getItem("username");

  if (!title || !price || !username) {
    alert("Fill all fields & login");
    return;
  }

  const tickets = JSON.parse(localStorage.getItem("tickets")) || [];

  tickets.push({
    title,
    category: main,
    subCategory: sub,
    price,
    image,
    seller: username
  });

  localStorage.setItem("tickets", JSON.stringify(tickets));

  alert("Ticket created!");

  window.location.href = "index.html";
}

function back() {
  window.location.href = "index.html";
}

updateSubcategories();
</script>

</body>
</html>
