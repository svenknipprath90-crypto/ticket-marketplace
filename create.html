<!DOCTYPE html>
<html>
<head>
  <title>Create Ticket</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
</head>

<body style="font-family: Arial; background:#0f172a; color:white; text-align:center;">

<h2>Create Ticket</h2>

<input id="title" placeholder="Title"><br><br>
<input id="price" placeholder="Price"><br><br>
<input id="mainCategory" placeholder="Category"><br><br>
<input id="subCategory" placeholder="Subcategory"><br><br>
<textarea id="description" placeholder="Description"></textarea><br><br>

<button onclick="createTicket()">Create</button>

<script>

// ✅ SUPABASE VERBINDUNG (FERTIG)
const supabase = window.supabase.createClient(
  "https://rucejmhjgfvlntoxhczm.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ1Y2VqbWhqZ2Z2bG50b3hoY3ptIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1NTU4OTcsImV4cCI6MjA5MDEzMTg5N30.Eq1vP38qyX0c-m23mceGg-gxZD_mn4sOyGqVxZMRoFk"
);

// ➕ Ticket erstellen
async function createTicket() {

  const title = document.getElementById("title").value;
  const price = parseFloat(document.getElementById("price").value);
  const category = document.getElementById("mainCategory").value;
  const subcategory = document.getElementById("subCategory").value;
  const description = document.getElementById("description").value;

  if (!title || !price) {
    alert("Fill all fields");
    return;
  }

  const { error } = await supabase.from("tickets").insert([
    {
      title,
      price,
      category,
      subcategory,
      description,
      image: "",
      seller: "user"
    }
  ]);

  if (error) {
    console.log(error);
    alert("Error creating ticket");
    return;
  }

  alert("Ticket created!");

  window.location.href = "index.html";
}

</script>

</body>
</html>
