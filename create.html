<!DOCTYPE html>
<html>
<head>
  <title>Create Ticket</title>

  <style>
    body {
      font-family: Arial;
      background: linear-gradient(180deg, #020617, #0f172a);
      color: white;
      margin: 0;
    }

    header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 15px;
      background: rgba(255,255,255,0.05);
    }

    header img {
      width: 35px;
      height: 35px;
      border-radius: 8px;
    }

    .container {
      padding: 15px;
    }

    .card {
      background: rgba(255,255,255,0.05);
      padding: 20px;
      border-radius: 16px;
      margin-top: 20px;
    }

    input, select {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border-radius: 10px;
      border: none;
    }

    label {
      font-size: 13px;
      color: #94a3b8;
      margin-top: 10px;
      display: block;
    }

    .create-btn {
      margin-top: 15px;
      width: 100%;
      padding: 14px;
      background: #6366f1;
      color: white;
      border: none;
      border-radius: 12px;
      font-weight: bold;
    }

    .back-btn {
      margin-top: 10px;
      width: 100%;
      padding: 10px;
      background: #334155;
      color: white;
      border: none;
      border-radius: 10px;
    }

    .error {
      color: #f87171;
      font-size: 12px;
      margin-top: 5px;
    }
  </style>
</head>

<body>

<header>
  <img src="0ED2A097-4CDA-417A-A473-BCD55056B90E.png?v=1">
  <span>Create Ticket</span>
</header>

<div class="container">

  <div class="card">

    <label>Title</label>
    <input id="title">
    <div id="titleError" class="error"></div>

    <label>Category</label>
    <select id="category">
      <option>Sport</option>
      <option>Concert</option>
      <option>Other</option>
    </select>

    <label>Price (Pi)</label>
    <input id="price" type="number" step="0.01">
    <div id="priceError" class="error"></div>

    <label>Image URL</label>
    <input id="image">

    <button class="create-btn" onclick="createTicket()">Create Ticket</button>

  </div>

  <button class="back-btn" onclick="back()">⬅ Back</button>

</div>

<script>
function validate(title, price) {
  let valid = true;

  document.getElementById("titleError").innerText = "";
  document.getElementById("priceError").innerText = "";

  // Titel prüfen
  if (!title || title.length < 5) {
    document.getElementById("titleError").innerText =
      "Title must be at least 5 characters";
    valid = false;
  }

  // Preis prüfen
  if (!price || price <= 0) {
    document.getElementById("priceError").innerText =
      "Price must be greater than 0";
    valid = false;
  }

  return valid;
}

function createTicket() {
  const title = document.getElementById("title").value.trim();
  const category = document.getElementById("category").value;
  const price = parseFloat(document.getElementById("price").value);
  const image = document.getElementById("image").value.trim();

  const username = localStorage.getItem("username");

  if (!username) {
    alert("Please login first");
    return;
  }

  if (!validate(title, price)) return;

  const tickets = JSON.parse(localStorage.getItem("tickets")) || [];

  tickets.push({
    title,
    category,
    price,
    image,
    seller: username
  });

  localStorage.setItem("tickets", JSON.stringify(tickets));

  alert("Ticket created successfully!");

  window.location.href = "index.html";
}

function back() {
  window.location.href = "index.html";
}
</script>

</body>
</html>
