<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Favoriten</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body {
  font-family: Arial;
  background: linear-gradient(#0a0f2c, #000);
  color: white;
  margin: 0;
  padding: 20px;
}

.card {
  background: #1b2a4a;
  padding: 15px;
  border-radius: 10px;
  margin-bottom: 15px;
}

button {
  padding: 10px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
  margin-bottom: 20px;
}
</style>
</head>

<body>

<h2>❤️ Favoriten</h2>

<button onclick="goBack()">⬅ Zurück</button>

<div id="list">Lade...</div>

<script>
const db = window.supabase.createClient(
  "https://rucejmhjgfvlntoxhczm.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ1Y2VqbWhqZ2Z2bG50b3hoY3ptIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1NTU4OTcsImV4cCI6MjA5MDEzMTg5N30.Eq1vP38qyX0c-m23mceGg-gxZD_mn4sOyGqVxZMRoFk"
);

function goBack() {
  window.location.href = "index.html";
}

async function loadFavorites() {

  const user = localStorage.getItem("pi_user");

  if (!user) {
    document.getElementById("list").innerText = "Nicht eingeloggt";
    return;
  }

  const { data: favs } = await db
    .from("favorites")
    .select("*")
    .eq("user_id", user);

  if (!favs || favs.length === 0) {
    document.getElementById("list").innerText = "Keine Favoriten";
    return;
  }

  const list = document.getElementById("list");
  list.innerHTML = "";

  for (let f of favs) {

    const { data: ticket } = await db
      .from("tickets")
      .select("*")
      .eq("id", f.ticket_id)
      .single();

    if (!ticket) continue;

    list.innerHTML += `
      <div class="card">
        <h3>${ticket.title}</h3>
        <p>${ticket.category}</p>
        <p>${ticket.description}</p>
        <b>${ticket.price} Pi</b>
      </div>
    `;
  }
}

loadFavorites();
</script>

</body>
</html>
