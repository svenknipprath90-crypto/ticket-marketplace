<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Favoriten</title>

<style>
body {
  background:#0b1220;
  color:white;
  font-family:sans-serif;
  padding:20px;
}

.card {
  background:#1e293b;
  border-radius:15px;
  overflow:hidden;
  margin-bottom:20px;
}

.card img {
  width:100%;
  height:220px;
  object-fit:cover;
}

.card-content {
  padding:15px;
}
</style>
</head>

<body>

<h1>❤️ Favoriten</h1>

<a href="index.html" style="color:#2563eb;">⬅ Zurück</a>

<div id="list"></div>

<script>

function loadFavorites() {

  const favs = JSON.parse(localStorage.getItem("favorites")) || [];

  const el = document.getElementById("list");

  if (favs.length === 0) {
    el.innerHTML = "Keine Favoriten";
    return;
  }

  el.innerHTML = "";

  favs.forEach(t => {
    el.innerHTML += `
      <div class="card">
        ${t.image ? `<img src="${t.image}">` : ""}
        <div class="card-content">
          <h3>${t.title}</h3>
          <p>${t.category}</p>
          <p>${t.description}</p>
          <strong>${t.price} Pi</strong>
        </div>
      </div>
    `;
  });

}

loadFavorites();

</script>

</body>
</html>
