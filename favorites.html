<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Favoriten</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://sdk.minepi.com/pi-sdk.js"></script>

<style>
body {
  margin:0;
  font-family:sans-serif;
  background:#0b1220;
  color:white;
}

.header {
  padding:20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  font-size:20px;
}

.button {
  padding:10px 15px;
  background:#2563eb;
  border:none;
  border-radius:10px;
  color:white;
  cursor:pointer;
}

#tickets {
  padding:15px;
}

.card {
  background:#1e293b;
  border-radius:15px;
  margin-bottom:20px;
  overflow:hidden;
}

.card img {
  width:100%;
  height:200px;
  object-fit:cover;
}

.content {
  padding:15px;
}

.heart {
  font-size:28px;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="header">
  <div>❤️ Meine Favoriten</div>
  <a href="index.html">
    <button class="button">⬅ Zurück</button>
  </a>
</div>

<div id="tickets"></div>

<script>

// ================= USER =================

let currentUser = localStorage.getItem("pi_user");

if (!currentUser) {
  alert("Bitte zuerst einloggen");
}

// ================= SUPABASE =================

const db = window.supabase.createClient(
  "https://rucejmhjgfvlntoxhczm.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ1Y2VqbWhqZ2Z2bG50b3hoY3ptIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1NTU4OTcsImV4cCI6MjA5MDEzMTg5N30.Eq1vP38qyX0c-m23mceGg-gxZD_mn4sOyGqVxZMRoFk"
);


// ================= LOAD FAVORITES =================

async function loadFavorites() {

  const { data: favs } = await db
    .from("favorites")
    .select("*")
    .eq("user_id", currentUser);

  if (!favs || favs.length === 0) {
    document.getElementById("tickets").innerHTML = "<p>Keine Favoriten</p>";
    return;
  }

  const ids = favs.map(f => f.ticket_id);

  const { data: tickets } = await db
    .from("tickets")
    .select("*")
    .in("id", ids);

  render(tickets);
}


// ================= REMOVE FAVORITE =================

async function removeFavorite(ticketId) {

  await db
    .from("favorites")
    .delete()
    .eq("user_id", currentUser)
    .eq("ticket_id", ticketId);

  loadFavorites();
}


// ================= RENDER =================

function render(tickets) {

  const el = document.getElementById("tickets");
  el.innerHTML = "";

  tickets.forEach(t => {

    el.innerHTML += `
      <div class="card">
        ${t.image ? `<img src="${t.image}">` : ""}
        <div class="content">
          <h3>${t.title}</h3>
          <p>${t.category}</p>
          <p>${t.description}</p>
          <strong>${t.price} Pi</strong>
          <br><br>

          <span class="heart" onclick="removeFavorite(${t.id})">
            ❤️ Entfernen
          </span>

        </div>
      </div>
    `;
  });
}


// ================= INIT =================

loadFavorites();

</script>

</body>
</html>
