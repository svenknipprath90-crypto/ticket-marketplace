<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Favoriten</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
  margin:0;
  font-family:sans-serif;
  background:#0b1220;
  color:white;
  padding:20px;
}

.card {
  background:#1e293b;
  border-radius:15px;
  margin-bottom:20px;
  overflow:hidden;
}

.card img {
  width:100%;
  height:200px;
  object-fit:cover;
}

.content {
  padding:15px;
}
</style>
</head>

<body>

<h1>❤️ Favoriten</h1>
<a href="index.html">← Zurück</a>

<div id="list"></div>

<script>

const db = window.supabase.createClient(
  "https://rucejmhjgfvlntoxhczm.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ1Y2VqbWhqZ2Z2bG50b3hoY3ptIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1NTU4OTcsImV4cCI6MjA5MDEzMTg5N30.Eq1vP38qyX0c-m23mceGg-gxZD_mn4sOyGqVxZMRoFk"
);

async function loadFavorites() {

  let ids = JSON.parse(localStorage.getItem("favorites")) || [];

  if (ids.length === 0) {
    document.getElementById("list").innerText = "Keine Favoriten";
    return;
  }

  const { data } = await db
    .from("tickets")
    .select("*")
    .in("id", ids);

  const el = document.getElementById("list");
  el.innerHTML = "";

  data.forEach(t => {
    el.innerHTML += `
      <div class="card">
        ${t.image ? `<img src="${t.image}">` : ""}
        <div class="content">
          <h3>${t.title}</h3>
          <p>${t.category}</p>
          <p>${t.description}</p>
          <strong>${t.price} Pi</strong>
        </div>
      </div>
    `;
  });

}

loadFavorites();

</script>

</body>
</html>
