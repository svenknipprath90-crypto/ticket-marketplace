<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Favoriten</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
  margin:0;
  font-family:sans-serif;
  background:#0b1220;
  color:white;
}

.header {
  padding:20px;
  font-size:22px;
  font-weight:bold;
}

.container {
  padding:15px;
}

.card {
  background:#1e293b;
  border-radius:15px;
  overflow:hidden;
  margin-bottom:20px;
  cursor:pointer;
}

.card img {
  width:100%;
  height:200px;
  object-fit:cover;
}

.card-content {
  padding:15px;
}

.title {
  font-size:18px;
  font-weight:bold;
}

.price {
  margin-top:10px;
  font-size:18px;
  font-weight:bold;
}

.back {
  display:inline-block;
  margin-bottom:20px;
  color:#60a5fa;
  text-decoration:none;
}
</style>
</head>

<body>

<div class="header">❤️ Favoriten</div>

<div class="container">

<a href="index.html" class="back">← Zurück</a>

<div id="tickets">Lade Favoriten...</div>

</div>

<script>

const db = window.supabase.createClient(
  "https://rucejmhjgfvlntoxhczm.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ1Y2VqbWhqZ2Z2bG50b3hoY3ptIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1NTU4OTcsImV4cCI6MjA5MDEzMTg5N30.Eq1vP38qyX0c-m23mceGg-gxZD_mn4sOyGqVxZMRoFk"
);

function getFavorites() {
  return JSON.parse(localStorage.getItem("favorites") || "[]");
}

async function loadFavorites() {

  const favs = getFavorites();
  const container = document.getElementById("tickets");

  if (favs.length === 0) {
    container.innerHTML = "Keine Favoriten ❤️";
    return;
  }

  const { data, error } = await db
    .from("tickets")
    .select("*")
    .in("id", favs);

  if (error) {
    container.innerHTML = "Fehler: " + error.message;
    return;
  }

  if (!data || data.length === 0) {
    container.innerHTML = "Keine Favoriten gefunden";
    return;
  }

  container.innerHTML = "";

  data.forEach(ticket => {

    const div = document.createElement("div");
    div.className = "card";

    div.onclick = () => {
      window.location.href = "ticket.html?id=" + ticket.id;
    };

    div.innerHTML = `
      ${ticket.image ? `<img src="${ticket.image}">` : ""}
      <div class="card-content">
        <div class="title">${ticket.title}</div>
        <div>${ticket.category || ""}</div>
        <div class="price">${ticket.price} Pi</div>
      </div>
    `;

    container.appendChild(div);

  });

}

loadFavorites();

</script>

</body>
</html>
