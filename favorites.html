<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Favoriten</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
  margin:0;
  font-family:sans-serif;
  background:#0b1220;
  color:white;
  padding:20px;
}

.card {
  background:#1e293b;
  border-radius:15px;
  overflow:hidden;
  margin-bottom:20px;
}

.card img {
  width:100%;
  height:200px;
  object-fit:cover;
}

.title {
  padding:10px;
  font-weight:bold;
}
</style>
</head>

<body>

<h2>❤️ Deine Favoriten</h2>

<a href="index.html">← Zurück</a>

<div id="tickets"></div>

<script>

if (!window.db) {
  window.db = window.supabase.createClient(
    "https://rucejmhjgfvlntoxhczm.supabase.co",
    "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
  );
}

const db = window.db;

function getFavorites() {
  return JSON.parse(localStorage.getItem("favorites") || "[]");
}

async function loadFavorites() {

  const favs = getFavorites();

  if (favs.length === 0) {
    document.getElementById("tickets").innerHTML = "Keine Favoriten";
    return;
  }

  const { data } = await db
    .from("tickets")
    .select("*")
    .in("id", favs);

  const container = document.getElementById("tickets");

  data.forEach(ticket => {

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      ${ticket.image ? `<img src="${ticket.image}">` : ""}
      <div class="title">${ticket.title} - ${ticket.price} Pi</div>
    `;

    container.appendChild(div);

  });

}

loadFavorites();

</script>

</body>
</html>
