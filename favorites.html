<!DOCTYPE html>
<html>
<head>
  <title>Favorites</title>

  <style>
    body {
      font-family: Arial;
      background: linear-gradient(180deg, #020617, #0f172a);
      color: white;
      margin: 0;
      padding: 15px;
    }

    .card {
      background: rgba(255,255,255,0.05);
      border-radius: 12px;
      padding: 10px;
      margin-top: 10px;
    }

    .title {
      font-weight: bold;
    }

    .small {
      color: #94a3b8;
      font-size: 12px;
    }

    button {
      margin-top: 10px;
      width: 100%;
      padding: 10px;
      border-radius: 10px;
      border: none;
      background: #334155;
      color: white;
    }
  </style>
</head>

<body>

<h1>❤️ Favorites</h1>

<div id="list"></div>

<button onclick="back()">⬅ Back</button>

<script>
function loadTickets() {
  const stored = JSON.parse(localStorage.getItem("tickets")) || [];

  const defaults = [
    { title: "Aachen vs Ingolstadt", price: 0.1, category: "Sport", seller: "System", image: "" },
    { title: "Concert Berlin", price: 0.2, category: "Concert", seller: "System", image: "" }
  ];

  return [...defaults, ...stored];
}

function getFavorites() {
  return JSON.parse(localStorage.getItem("favorites")) || [];
}

function render() {
  const tickets = loadTickets();
  const favs = getFavorites();

  const container = document.getElementById("list");
  container.innerHTML = "";

  if (favs.length === 0) {
    container.innerHTML = "<p>No favorites yet</p>";
    return;
  }

  favs.forEach(i => {
    const t = tickets[i];

    if (!t) return;

    container.innerHTML += `
      <div class="card">
        <div class="title">${t.title}</div>
        <div class="small">${t.category}</div>
        <div>${t.price} Pi</div>
      </div>
    `;
  });
}

function back() {
  window.location.href = "index.html";
}

render();
</script>

</body>
</html>
