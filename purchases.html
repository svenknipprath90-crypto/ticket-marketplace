<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Meine Käufe</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
  background:#0b1220;
  color:white;
  font-family:sans-serif;
  padding:20px;
}

.card {
  background:#1e293b;
  padding:15px;
  border-radius:10px;
  margin-bottom:15px;
}
</style>
</head>

<body>

<h2>💰 Meine Käufe</h2>
<a href="index.html">← Zurück</a>

<div id="list"></div>

<script>

const db = window.supabase.createClient(
  "https://rucejmhjgfvlntoxhczm.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
);

const purchases = JSON.parse(localStorage.getItem("purchases") || "[]");

async function load() {

  if (purchases.length === 0) {
    document.getElementById("list").innerHTML = "Noch nichts gekauft";
    return;
  }

  const { data } = await db
    .from("tickets")
    .select("*")
    .in("id", purchases);

  const container = document.getElementById("list");

  data.forEach(t => {
    container.innerHTML += `
      <div class="card">
        ${t.title} - ${t.price} Pi
      </div>
    `;
  });

}

load();

</script>

</body>
</html>
