<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Edit Ticket</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  
  <link rel="stylesheet" href="style.css">
  <script src="i18n.js"></script>
</head>
<body>

<div class="container">
  <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
    <button onclick="window.history.back()" class="btn btn-glass" data-i18n="back">⬅ Zurück</button>
    <div class="lang-toggle">
      <button class="lang-btn" id="lang-de" onclick="setLanguage('de'); window.location.reload();">🇩🇪</button>
      <button class="lang-btn" id="lang-en" onclick="setLanguage('en'); window.location.reload();">🇬🇧</button>
    </div>
  </div>

  <div class="glass-panel">
    <h1 style="margin-top:0;" data-i18n="editTitle">Ticket bearbeiten</h1>

    <div class="form-group">
      <input id="title" placeholder="Title / Titel des Tickets">
    </div>

    <div class="form-group">
      <select id="category">
        <option value="Fußball" data-i18n="cat_football">⚽️ Fußball</option>
        <option value="Basketball" data-i18n="cat_basketball">🏀 Basketball</option>
        <option value="American Football" data-i18n="cat_amfootball">🏈 American Football</option>
        <option value="Darts" data-i18n="cat_darts">🎯 Darts</option>
        <option value="Kampfsport" data-i18n="cat_fight">🥊 Kampfsport</option>
        <option value="eSports" data-i18n="cat_esports">🎮 eSports</option>
        <option value="Radsport" data-i18n="cat_bike">🚴‍♂️ Radsport</option>
        <option value="Leichtathletik" data-i18n="cat_track">🏃‍♂️ Leichtathletik</option>
        <option value="Handball" data-i18n="cat_handball">🤾‍♂️ Handball</option>
        <option value="Eishockey" data-i18n="cat_hockey">🏒 Eishockey</option>
        <option value="Tennis" data-i18n="cat_tennis">🎾 Tennis</option>
        <option value="Motorsport" data-i18n="cat_motor">🏎️ Motorsport</option>
        <option value="Wintersport" data-i18n="cat_winter">⛷️ Wintersport</option>
        <option value="Schwimmen" data-i18n="cat_swim">🏊‍♂️ Schwimmen</option>
        <option value="Rugby" data-i18n="cat_rugby">🏉 Rugby</option>
        <option value="Festival" data-i18n="cat_festival">🎪 Festival</option>
        <option value="Konzert" data-i18n="cat_concert">🎸 Konzert</option>
        <option value="Messe/Convention" data-i18n="cat_expo">🎡 Messe/Convention</option>
        <option value="Freizeitpark" data-i18n="cat_park">🎢 Freizeitpark</option>
        <option value="Kultur/Klassik" data-i18n="cat_culture">🎭 Kultur/Klassik</option>
        <option value="Musical" data-i18n="cat_musical">🎶 Musical</option>
        <option value="Theater/Comedy" data-i18n="cat_theater">🎬 Theater / Comedy</option>
        <option value="Olympia/Turnier" data-i18n="cat_olympics">🏆 Olympia / Großturnier</option>
        <option value="Reise/Gutschein" data-i18n="cat_travel">🚌 Reise / Gutschein</option>
        <option value="Sonstiges" data-i18n="cat_other">🎫 Sonstiges</option>
      </select>
    </div>

    <div class="form-group">
      <input id="location" data-i18n="location" placeholder="Liga / Zusatzinfo (optional)">
    </div>

    <div class="form-group">
      <input id="price" type="number" data-i18n="price" placeholder="Preis (in Pi)" min="0" step="0.01">
    </div>

    <div class="form-group">
      <input id="quantity" type="number" data-i18n="quantity" placeholder="Anzahl / Verfügbarkeit" value="1" min="1">
    </div>

    <div class="form-group">
      <textarea id="description" data-i18n="description" placeholder="Beschreibung" rows="4"></textarea>
    </div>

    <div class="form-group">
      <label data-i18n="image">Neue Bilder (optional, bis zu 3):</label>
      <input type="file" id="image" accept="image/*">
      <input type="file" id="image2" accept="image/*" style="margin-top: 10px;">
      <input type="file" id="image3" accept="image/*" style="margin-top: 10px;">
    </div>

    <button id="saveBtn" class="btn btn-success" style="width: 100%; font-size: 18px;" data-i18n="saveBtn" onclick="saveTicket()">
      Ticket speichern
    </button>
  </div>
</div>

<script>
  let currentUser = localStorage.getItem("pi_user") || null;
  const params = new URLSearchParams(window.location.search);
  const ticketId = params.get("id");

  const supabase = window.supabase.createClient(
    "https://rucejmhjgfvlntoxhczm.supabase.co",
    "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ1Y2VqbWhqZ2Z2bG50b3hoY3ptIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1NTU4OTcsImV4cCI6MjA5MDEzMTg5N30.Eq1vP38qyX0c-m23mceGg-gxZD_mn4sOyGqVxZMRoFk"
  );

  document.addEventListener("DOMContentLoaded", () => {
    try {
      document.getElementById("lang-de").classList.toggle("active", currentLang === "de");
      document.getElementById("lang-en").classList.toggle("active", currentLang === "en");
    } catch(e) {}

    if (!currentUser || !ticketId) {
      window.location.href = "index.html";
      return;
    }

    loadTicket();
  });

  async function loadTicket() {
    const { data, error } = await supabase.from("tickets").select("*").eq("id", ticketId).single();
    if (error || !data || data.seller !== currentUser) {
      alert("Fehler beim Laden des Tickets.");
      window.location.href = "my-sales.html";
      return;
    }

    document.getElementById("title").value = data.title;
    document.getElementById("category").value = data.category;
    document.getElementById("location").value = data.location || "";
    document.getElementById("price").value = data.price;
    document.getElementById("quantity").value = data.quantity;
    document.getElementById("description").value = data.description || "";
  }

  async function saveTicket() {
    try {
      if (!window.supabase) {
        alert("Supabase Error");
        return;
      }

      const title = document.getElementById("title").value.trim();
      const category = document.getElementById("category").value;
      const location = document.getElementById("location").value.trim();
      let priceStr = document.getElementById("price").value;
      const quantity = document.getElementById("quantity").value || 1;
      const description = document.getElementById("description").value.trim();
      const file = document.getElementById("image").files[0];
      const file2 = document.getElementById("image2").files[0];
      const file3 = document.getElementById("image3").files[0];

      if(!title || !priceStr) {
        alert("Titel und Preis sind erforderlich!");
        return;
      }

      priceStr = priceStr.replace(',', '.');
      const parsedPrice = Number(priceStr);
      if (isNaN(parsedPrice)) {
        alert("Bitte einen gültigen Preis eingeben (z.B. 10.50)");
        return;
      }

      document.getElementById("saveBtn").innerText = "Lade... / Saving...";
      document.getElementById("saveBtn").disabled = true;

      const updates = {
        title: title,
        category: category,
        location: location,
        price: parsedPrice,
        quantity: Number(quantity),
        description: description
      };

      async function uploadFile(f) {
        if (!f) return null;
        const fileName = Date.now() + "_" + f.name.replace(/[^a-zA-Z0-9.\-_]/g, '');
        const { data, error } = await supabase.storage.from("tickets").upload(fileName, f);
        if (error) throw error;
        return `https://rucejmhjgfvlntoxhczm.supabase.co/storage/v1/object/public/tickets/${fileName}`;
      }

      try {
        if (file) updates.image = await uploadFile(file);
        if (file2) updates.image2 = await uploadFile(file2);
        if (file3) updates.image3 = await uploadFile(file3);
      } catch (uploadError) {
        alert("Upload Fehler: " + (uploadError.message || JSON.stringify(uploadError)));
        document.getElementById("saveBtn").innerText = "Ticket speichern";
        document.getElementById("saveBtn").disabled = false;
        return;
      }

      const { error } = await supabase.from("tickets").update(updates).eq("id", ticketId).eq("seller", currentUser);

      if (error) {
        alert("Datenbank Fehler: " + (error.message || JSON.stringify(error)));
        document.getElementById("saveBtn").innerText = "Ticket speichern";
        document.getElementById("saveBtn").disabled = false;
      } else {
        alert("Ticket erfolgreich aktualisiert!");
        window.location.href = "my-sales.html";
      }
    } catch (err) {
      console.error(err);
      alert("Fehler aufgetreten: " + err.message);
      document.getElementById("saveBtn").innerText = "Ticket speichern";
      document.getElementById("saveBtn").disabled = false;
    }
  }
</script>

</body>
</html>
