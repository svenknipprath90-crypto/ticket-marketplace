<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Ticket</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
  background:#0b1220;
  color:white;
  padding:20px;
}
img {
  width:100%;
  border-radius:10px;
}
.button {
  margin-top:20px;
  padding:15px;
  background:#16a34a;
  text-align:center;
}
</style>
</head>

<body>

<a href="index.html">← Zurück</a>

<div id="content"></div>

<script>

const db = window.supabase.createClient(
  "https://rucejmhjgfvlntoxhczm.supabase.co",
  "DEIN_KEY_HIER"
);

const id = new URLSearchParams(window.location.search).get("id");

async function load() {
  const { data } = await db.from("tickets").select("*").eq("id", id).single();

  document.getElementById("content").innerHTML = `
    ${data.image ? `<img src="${data.image}">` : ""}
    <h2>${data.title}</h2>
    <p>${data.description}</p>
    <b>${data.price} Pi</b>

    <div class="button" onclick="buy(${data.id})">💰 Kaufen</div>
  `;
}

function buy(id) {
  let p = JSON.parse(localStorage.getItem("purchases")||"[]");
  if(!p.includes(id)) p.push(id);
  localStorage.setItem("purchases", JSON.stringify(p));
  alert("Gekauft!");
}

load();

</script>

</body>
</html>
