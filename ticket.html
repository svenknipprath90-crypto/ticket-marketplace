<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Ticket</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
  margin:0;
  font-family:sans-serif;
  background:#0b1220;
  color:white;
  padding:20px;
}

img {
  width:100%;
  border-radius:15px;
  margin-bottom:20px;
}

.title {
  font-size:22px;
  font-weight:bold;
}

.price {
  font-size:20px;
  margin-top:10px;
}

.desc {
  margin-top:15px;
  color:#9ca3af;
}

.back {
  display:inline-block;
  margin-bottom:20px;
  color:#60a5fa;
}
</style>
</head>

<body>

<a href="index.html" class="back">← Zurück</a>

<div id="content"></div>

<script>

if (!window.db) {
  window.db = window.supabase.createClient(
    "https://rucejmhjgfvlntoxhczm.supabase.co",
    "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ1Y2VqbWhqZ2Z2bG50b3hoY3ptIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1NTU4OTcsImV4cCI6MjA5MDEzMTg5N30.Eq1vP38qyX0c-m23mceGg-gxZD_mn4sOyGqVxZMRoFk"
  );
}

const db = window.db;

const params = new URLSearchParams(window.location.search);
const id = params.get("id");

async function loadTicket() {

  const { data } = await db
    .from("tickets")
    .select("*")
    .eq("id", id)
    .single();

  const container = document.getElementById("content");

  container.innerHTML = `
    ${data.image ? `<img src="${data.image}">` : ""}
    <div class="title">${data.title}</div>
    <div class="price">${data.price} Pi</div>
    <div class="desc">${data.description}</div>
  `;
}

loadTicket();

</script>

</body>
</html>
