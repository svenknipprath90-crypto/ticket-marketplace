<!DOCTYPE html>
<html>
<head>
  <title>Ticket Details</title>
  <script src="https://sdk.minepi.com/pi-sdk.js"></script>

  <style>
    body {
      font-family: Arial;
      background: linear-gradient(180deg, #020617, #0f172a);
      color: white;
      margin: 0;
    }

    header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 15px;
      background: rgba(255,255,255,0.05);
    }

    header img {
      width: 35px;
      height: 35px;
      border-radius: 8px;
    }

    .container {
      padding: 15px;
    }

    .card {
      background: rgba(255,255,255,0.05);
      border-radius: 16px;
      overflow: hidden;
      margin-top: 20px;
    }

    .card img {
      width: 100%;
      height: 200px;
      object-fit: cover;
    }

    .content {
      padding: 15px;
    }

    .title {
      font-size: 22px;
      font-weight: bold;
    }

    .small {
      color: #94a3b8;
      margin-top: 5px;
    }

    .total {
      font-size: 22px;
      font-weight: bold;
      margin-top: 10px;
    }

    .buy-btn {
      margin-top: 15px;
      width: 100%;
      padding: 14px;
      background: #22c55e;
      color: white;
      border: none;
      border-radius: 12px;
    }

    .back-btn {
      margin-top: 10px;
      width: 100%;
      padding: 10px;
      background: #334155;
      color: white;
      border: none;
      border-radius: 10px;
    }
  </style>
</head>

<body>

<header>
  <img src="0ED2A097-4CDA-417A-A473-BCD55056B90E.png?v=1">
  <span>Pi Ticket Marketplace</span>
</header>

<div class="container" id="content"></div>

<script>
const feePercent = 0.05;

function loadTicket() {
  return JSON.parse(localStorage.getItem("selectedTicket"));
}

function render() {
  const ticket = loadTicket();

  const fee = ticket.price * feePercent;
  const total = ticket.price + fee;

  const image = ticket.image && ticket.image.trim() !== ""
    ? ticket.image
    : "https://images.unsplash.com/photo-1508098682722-e99c643e7f5c";

  document.getElementById("content").innerHTML = `
    <div class="card">
      <img src="${image}">
      <div class="content">
        <div class="title">${ticket.title}</div>
        <div class="small">${ticket.category}</div>
        <div class="small">👤 ${ticket.seller}</div>

        <div>Price: ${ticket.price.toFixed(2)} Pi</div>
        <div class="small">Fee: ${fee.toFixed(2)} Pi</div>
        <div class="total">${total.toFixed(2)} Pi</div>

        <button class="buy-btn" onclick="buy()">Buy Ticket</button>
        <button class="back-btn" onclick="back()">⬅ Back</button>
      </div>
    </div>
  `;
}

function back() {
  window.location.href = "index.html";
}

async function buy() {
  try {
    await Pi.init({ version: "2.0" });

    const ticket = JSON.parse(localStorage.getItem("selectedTicket"));

    const fee = ticket.price * feePercent;
    const total = ticket.price + fee;

    await Pi.createPayment({
      amount: total,
      memo: "Ticket purchase",
      metadata: {
        seller: ticket.seller,
        price: ticket.price,
        fee: fee
      }
    });

    // 🔥 Seller Balance speichern
    const balances = JSON.parse(localStorage.getItem("balances")) || {};

    if (!balances[ticket.seller]) {
      balances[ticket.seller] = 0;
    }

    balances[ticket.seller] += ticket.price;

    localStorage.setItem("balances", JSON.stringify(balances));

    alert("Payment successful!");

  } catch (e) {
    alert("Payment failed");
  }
}

render();
</script>

</body>
</html>
