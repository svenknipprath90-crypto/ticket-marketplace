<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Ticket Details</title>

<!-- External Scripts -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://sdk.minepi.com/pi-sdk.js"></script>

<!-- CSS & i18n -->
<link rel="stylesheet" href="style.css">
<script src="i18n.js"></script>

<style>
.ticket-detail-card {
  background: var(--glass-bg);
  backdrop-filter: blur(12px);
  border: 1px solid var(--glass-border);
  border-radius: 20px;
  padding: 30px;
  margin-top: 20px;
}
.ticket-detail-img {
  width: 100%;
  height: 300px;
  object-fit: cover;
  border-radius: 15px;
  margin-bottom: 20px;
  cursor: pointer;
  transition: transform 0.3s;
}
.ticket-detail-img:hover {
  transform: scale(1.02);
}
.ticket-info p {
  margin: 10px 0;
  color: var(--text-muted);
}
.ticket-info strong {
  color: var(--text-main);
}
.price-box {
  background: rgba(0,0,0,0.3);
  padding: 20px;
  border-radius: 15px;
  margin-top: 20px;
  border: 1px solid var(--glass-border);
}
</style>
</head>
<body>

<div class="container">
  <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
    <a href="index.html" class="btn btn-glass" data-i18n="back">⬅ Zurück</a>
    <div class="lang-toggle">
      <button class="lang-btn" id="lang-de" onclick="setLanguage('de'); window.location.reload();">🇩🇪</button>
      <button class="lang-btn" id="lang-en" onclick="setLanguage('en'); window.location.reload();">🇬🇧</button>
    </div>
  </div>

  <div id="content" class="ticket-detail-card">
    <div style="text-align: center; margin-top: 50px;">Lade... / Loading...</div>
  </div>
</div>

<!-- Lightbox -->
<div id="lightbox" class="lightbox" onclick="closeLightbox()">
  <span class="lightbox-close">&times;</span>
  <img id="lightbox-img" src="">
</div>

<script>
// ================= LIGHTBOX =================
function openLightbox(src) {
  document.getElementById('lightbox-img').src = src;
  document.getElementById('lightbox').style.display = 'flex';
}
function closeLightbox() {
  document.getElementById('lightbox').style.display = 'none';
}

// ================= PI INIT & LOGIN =================
Pi.init({ version: "2.0", sandbox: true });

let currentUser = localStorage.getItem("pi_user") || null;

document.addEventListener("DOMContentLoaded", () => {
  document.getElementById("lang-de").classList.toggle("active", currentLang === "de");
  document.getElementById("lang-en").classList.toggle("active", currentLang === "en");
});

const onIncompletePaymentFound = async (payment) => {
  console.log("Incomplete payment found:", payment);
  try {
    if (payment.transaction && payment.transaction.txid) {
      await fetch("https://rucejmhjgfvlntoxhczm.supabase.co/functions/v1/verify-payment", {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ action: "complete", paymentId: payment.identifier, txid: payment.transaction.txid })
      });
    } else {
      await fetch("https://rucejmhjgfvlntoxhczm.supabase.co/functions/v1/verify-payment", {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ action: "approve", paymentId: payment.identifier })
      });
    }
  } catch (e) { console.error("Error handling incomplete payment:", e); }
};

// ================= SUPABASE =================
const db = window.supabase.createClient(
  "https://rucejmhjgfvlntoxhczm.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ1Y2VqbWhqZ2Z2bG50b3hoY3ptIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1NTU4OTcsImV4cCI6MjA5MDEzMTg5N30.Eq1vP38qyX0c-m23mceGg-gxZD_mn4sOyGqVxZMRoFk"
);

// ================= LOAD TICKET =================
let currentTicket = null;
const params = new URLSearchParams(window.location.search);
const ticketId = params.get("id");

async function loadTicket() {
  const { data, error } = await db.from("tickets").select("*").eq("id", ticketId).single();
  if (error || !data) {
    document.getElementById("content").innerHTML = "Fehler beim Laden / Loading Error";
    return;
  }
  currentTicket = data;
  render(data);
}

// ================= UI =================
function render(tData) {
  const maxQty = tData.quantity || 1;
  const isSoldOut = maxQty <= 0;

  window.updatePrice = function() {
    const inputEl = document.getElementById('buyQuantity');
    if(!inputEl) return;
    
    let qty = parseInt(inputEl.value) || 1;
    if (qty > maxQty) { qty = maxQty; inputEl.value = maxQty; }
    if (qty < 1) { qty = 1; inputEl.value = 1; }

    const basePrice = parseFloat(tData.price);
    const fee = (basePrice * qty * 0.1).toFixed(2);
    const total = (basePrice * qty + parseFloat(fee)).toFixed(2);

    document.getElementById('priceDisplay').innerHTML = `
      <div style="display: flex; justify-content: space-between; align-items: center;">
        <h3 style="margin:0;">${(basePrice * qty).toFixed(2)} Pi (x${qty})</h3>
        <p style="margin:0;">${t("serviceFee")}: ${fee} Pi</p>
      </div>
      <h2 style="margin: 15px 0 20px 0; color: #fbbf24;">${t("total")}: ${total} Pi</h2>
      
      ${currentUser ? 
        `<button class="btn btn-primary" style="width:100%; font-size:18px;" onclick="buy(${total}, ${qty})">${t("buyBtn")}</button>` : 
        `<div style="text-align:center; padding: 15px; background: rgba(239, 68, 68, 0.2); border-radius: 10px; color: #fca5a5;">
          ${t("notLoggedIn")} <br> <a href="index.html" style="color: white; font-weight: bold;">${t("buyLoginBtn")}</a>
         </div>`
      }
    `;
  };

  const imageHtml = tData.image ? `<img src="${tData.image}" class="ticket-detail-img" onclick="openLightbox('${tData.image}')">` : "";
  const locationHtml = tData.location ? `<p><strong>${t("location")}:</strong> ${tData.location}</p>` : "";
  const availableText = t("available", { n: maxQty });

  document.getElementById("content").innerHTML = `
    ${imageHtml}
    <h1 style="margin-top:0;">${tData.title}</h1>
    <span class="tag" style="font-size:14px;">${tData.category}</span>
    
    <div class="ticket-info" style="margin-top: 20px;">
      <p><strong>${t("description")}:</strong><br> ${tData.description}</p>
      ${locationHtml}
      <p style="color: ${isSoldOut ? 'var(--danger)' : 'var(--success)'}; font-weight: bold; font-size: 18px;">
        ${isSoldOut ? '❌ ' + t("soldOut") : '📦 ' + availableText}
      </p>
    </div>
    
    ${!isSoldOut ? `
    <div class="price-box">
      <div class="form-group">
        <label>${t("selectQty")}</label>
        <input type="number" id="buyQuantity" min="1" max="${maxQty}" value="1" onchange="updatePrice()" onkeyup="updatePrice()">
      </div>
      <div id="priceDisplay"></div>
    </div>
    ` : ''}
  `;
  
  if(!isSoldOut) updatePrice();
}

// ================= PAYMENT =================
async function buy(amount, selectedQuantity) {
  if (!currentUser) return;

  try {
    await Pi.authenticate(["payments", "username"], onIncompletePaymentFound);
    await Pi.createPayment({
      amount: amount,
      memo: selectedQuantity + "x Ticket Kauf",
      metadata: { ticketId: ticketId, quantity: selectedQuantity }
    }, {
      onReadyForServerApproval: async (paymentId) => {
        const res = await fetch("https://rucejmhjgfvlntoxhczm.supabase.co/functions/v1/verify-payment", {
          method: "POST", headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ action: "approve", paymentId: paymentId })
        });
        const data = await res.json();
        if (!data.success) throw new Error("Approve fehlgeschlagen");
      },
      onReadyForServerCompletion: async (paymentId, txid) => {
        const res = await fetch("https://rucejmhjgfvlntoxhczm.supabase.co/functions/v1/verify-payment", {
          method: "POST", headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ action: "complete", paymentId: paymentId, txid: txid })
        });
        const data = await res.json();
        if (!data.success) throw new Error("Complete fehlgeschlagen");

        if (currentTicket) {
          let newQuantity = (currentTicket.quantity || 1) - selectedQuantity;
          let dbError = null;
          if (newQuantity <= 0) {
            const res = await db.from("tickets").delete().eq("id", ticketId);
            dbError = res.error;
          } else {
            const res = await db.from("tickets").update({ quantity: newQuantity }).eq("id", ticketId);
            dbError = res.error;
          }

          if (dbError) {
             console.error("Supabase RLS Error:", dbError);
             alert(t("success") + " ABER " + t("dbError") + " (Supabase RLS)");
          } else {
             alert(t("success"));
          }
        } else {
             alert(t("success"));
        }

        let purchases = JSON.parse(localStorage.getItem("purchases") || "[]");
        if (!purchases.includes(ticketId)) {
          purchases.push(ticketId);
          localStorage.setItem("purchases", JSON.stringify(purchases));
        }

        window.location.href = "index.html";
      },
      onCancel: () => alert(t("cancel")),
      onError: (e) => alert("Error: " + e.message)
    });
  } catch (e) { alert(e.message); }
}

loadTicket();
</script>
</body>
</html>
