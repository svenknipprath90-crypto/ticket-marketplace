<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Ticket</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
  margin:0;
  font-family:sans-serif;
  background:#0b1220;
  color:white;
  padding:20px;
}

img {
  width:100%;
  border-radius:15px;
  margin-bottom:20px;
}

.title {
  font-size:22px;
  font-weight:bold;
}

.price {
  font-size:20px;
  margin-top:10px;
}

.desc {
  margin-top:15px;
  color:#9ca3af;
}

.button {
  display:block;
  margin-top:20px;
  padding:15px;
  text-align:center;
  background:#16a34a;
  border-radius:10px;
  font-weight:bold;
  cursor:pointer;
}

.back {
  display:inline-block;
  margin-bottom:20px;
  color:#60a5fa;
}
</style>
</head>

<body>

<a href="index.html" class="back">← Zurück</a>

<div id="content"></div>

<script>

const db = window.supabase.createClient(
  "https://rucejmhjgfvlntoxhczm.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
);

const params = new URLSearchParams(window.location.search);
const id = params.get("id");

async function loadTicket() {

  const { data } = await db
    .from("tickets")
    .select("*")
    .eq("id", id)
    .single();

  const container = document.getElementById("content");

  container.innerHTML = `
    ${data.image ? `<img src="${data.image}">` : ""}
    <div class="title">${data.title}</div>
    <div class="price">${data.price} Pi</div>
    <div class="desc">${data.description}</div>

    <div class="button" onclick="buyTicket(${data.id})">
      💰 Kaufen
    </div>
  `;
}

// KAUF FUNKTION
function buyTicket(id) {

  let purchases = JSON.parse(localStorage.getItem("purchases") || "[]");

  if (!purchases.includes(id)) {
    purchases.push(id);
  }

  localStorage.setItem("purchases", JSON.stringify(purchases));

  alert("✅ Ticket gekauft!");
}

loadTicket();

</script>

</body>
</html>
